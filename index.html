<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Dynasty HQ</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f12;--bg2:#151820;--bg3:#1c2029;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --text:#f0f2f5;--text2:#8891a4;--text3:#555e6e;
  --accent:#4f8ef7;--green:#3ecf8e;--amber:#f6a623;--red:#f25c54;--purple:#a78bfa;--teal:#2dd4bf;
  --r:10px;--rl:14px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-text-size-adjust:100%;overscroll-behavior:none}
.app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:calc(var(--safe-top)+10px) 14px 10px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:100}
.topbar h1{font-size:15px;font-weight:600;letter-spacing:-.01em;flex:1}
.topbar p{font-size:11px;color:var(--text2)}
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 13px calc(var(--safe-bot)+76px)}
.bottomnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding:7px 0 calc(var(--safe-bot)+3px);display:flex;justify-content:space-around;z-index:100}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:3px 6px;border:none;background:none;color:var(--text3);font-family:inherit;font-size:10px;font-weight:500;cursor:pointer;min-width:52px;-webkit-tap-highlight-color:transparent}
.nav-btn svg{width:20px;height:20px;stroke-width:1.75}
.nav-btn.active{color:var(--accent)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:13px;margin-bottom:10px}
.ctitle{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:11px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:10px}
.metric{background:var(--bg3);border-radius:var(--r);padding:10px 11px}
.mlabel{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.mval{font-size:20px;font-weight:600;letter-spacing:-.02em;line-height:1.1}
.msub{font-size:11px;color:var(--text2);margin-top:1px}
.prow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.prow:last-child{border-bottom:none}
.pname{flex:1;font-size:13px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pmeta{font-size:11px;color:var(--text3);flex-shrink:0}
.pteam{font-size:11px;color:var(--text2);min-width:24px;flex-shrink:0}
.pos{font-size:10px;font-weight:700;padding:2px 5px;border-radius:4px;min-width:26px;text-align:center;font-family:'DM Mono',monospace;flex-shrink:0}
.QB{background:rgba(242,92,84,.15);color:#f25c54}.RB{background:rgba(62,207,142,.15);color:#3ecf8e}
.WR{background:rgba(79,142,247,.15);color:#4f8ef7}.TE{background:rgba(246,166,35,.15);color:#f6a623}
.K,.DEF,.DL,.LB,.DB,.IDL,.EDGE{background:rgba(136,145,164,.13);color:#8891a4}
.vb{font-size:11px;font-weight:600;padding:2px 6px;border-radius:4px;font-family:'DM Mono',monospace;flex-shrink:0;white-space:nowrap}
.vS{background:rgba(167,139,250,.15);color:var(--purple)}.vA{background:rgba(79,142,247,.15);color:var(--accent)}
.vB{background:rgba(62,207,142,.15);color:var(--green)}.vC{background:rgba(246,166,35,.15);color:var(--amber)}
.vD{background:rgba(242,92,84,.15);color:var(--red)}.vNA{background:rgba(136,145,164,.08);color:var(--text3)}
.trend-up{color:var(--green);font-size:11px;font-family:'DM Mono',monospace}
.trend-dn{color:var(--red);font-size:11px;font-family:'DM Mono',monospace}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:8px;font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text);-webkit-tap-highlight-color:transparent}
.btn:active{opacity:.7}.btn.on{background:rgba(79,142,247,.14);border-color:rgba(79,142,247,.4);color:var(--accent)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-sm{padding:4px 9px;font-size:11px}
.filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.inp{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-family:inherit;font-size:14px;outline:none;-webkit-appearance:none}
.inp:focus{border-color:var(--accent)}.inp::placeholder{color:var(--text3)}
.sel{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:8px;font-family:inherit;font-size:13px;outline:none;-webkit-appearance:none;cursor:pointer}
.sel:focus{border-color:var(--accent)} select option{background:#1c2029}
.srow{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:7px;margin-bottom:2px}
.srow.me{background:rgba(79,142,247,.08);border:1px solid rgba(79,142,247,.2)}
.srank{font-size:11px;color:var(--text3);width:20px;font-family:'DM Mono',monospace;flex-shrink:0}
.sname{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.srec{font-size:12px;color:var(--text2);font-family:'DM Mono',monospace;min-width:36px;text-align:right;flex-shrink:0}
.spts{font-size:11px;color:var(--text3);min-width:50px;text-align:right;font-family:'DM Mono',monospace;flex-shrink:0}
.ytag{font-size:9px;background:rgba(79,142,247,.2);color:var(--accent);padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:700}
.prog-wrap{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.prog-bar{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.tside{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rl);padding:10px}
.tside h3{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.tlist{max-height:190px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tchk{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);cursor:pointer}
.tchk:last-child{border-bottom:none}
.tchk input[type=checkbox]{accent-color:var(--accent);width:14px;height:14px;flex-shrink:0}
.ttotal{margin-top:6px;padding-top:6px;border-top:1px solid var(--border);font-size:11px;font-weight:600;font-family:'DM Mono',monospace;color:var(--text2)}
.verdict{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rl);padding:14px;text-align:center}
.txn{background:var(--bg3);border-radius:8px;padding:10px;margin-bottom:7px;border:1px solid var(--border)}
.txnhead{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.txntype{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:.05em}
.txn-trade{background:rgba(79,142,247,.15);color:var(--accent)}
.txn-add{background:rgba(62,207,142,.15);color:var(--green)}
.txn-waiver{background:rgba(167,139,250,.15);color:var(--purple)}
.txndate{font-size:11px;color:var(--text3);margin-left:auto;flex-shrink:0}
.pkbadge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;background:rgba(167,139,250,.12);color:var(--purple);font-family:'DM Mono',monospace}
.spin{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
.spin-sm{width:16px;height:16px;border-width:2px}
@keyframes sp{to{transform:rotate(360deg)}}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;gap:14px}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px;flex-shrink:0}
.ok{background:var(--green)}.pend{background:var(--amber);animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.empty{text-align:center;padding:2rem 0;color:var(--text3);font-size:13px}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--green);color:#0d0f12;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;pointer-events:none;white-space:nowrap;opacity:0;transition:opacity .2s}
.toast.show{opacity:1}
.news-item{padding:9px 0;border-bottom:1px solid var(--border)}
.news-item:last-child{border-bottom:none}
.news-headline{font-size:13px;font-weight:500;margin-bottom:2px;line-height:1.4}
.news-meta{font-size:11px;color:var(--text3)}
.news-desc{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.5}
.analysis-box{background:linear-gradient(135deg,rgba(79,142,247,.07),rgba(167,139,250,.05));border:1px solid rgba(79,142,247,.18);border-radius:var(--rl);padding:14px;margin-bottom:10px}
.stat-grid{display:flex;flex-wrap:wrap;gap:1px;background:var(--border);border-radius:8px;overflow:hidden;margin-bottom:10px}
.stat-cell{background:var(--bg3);flex:1;min-width:70px;padding:8px 10px;text-align:center}
.stat-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.stat-val{font-size:15px;font-weight:600;font-family:'DM Mono',monospace}
.year-tab{display:flex;gap:4px;margin-bottom:10px}
.rank-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;margin-bottom:2px}
.rank-row.hl{background:rgba(79,142,247,.08);border:1px solid rgba(79,142,247,.2)}
.scout-section{margin-bottom:10px}
.scout-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.scout-text{font-size:13px;color:var(--text2);line-height:1.65}
.verdict-tag{display:inline-block;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:8px}
.buy{background:rgba(62,207,142,.15);color:var(--green)}
.sell{background:rgba(242,92,84,.15);color:var(--red)}
.hold{background:rgba(246,166,35,.15);color:var(--amber)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="loading" id="loading">
  <div class="spin"></div>
  <p style="font-size:15px;font-weight:600">Dynasty HQ</p>
  <p style="font-size:13px;color:var(--text2);margin-top:4px" id="lmsg">Connecting to Sleeper…</p>
  <p style="font-size:11px;color:var(--text3);max-width:260px;text-align:center;line-height:1.6;margin-top:6px">Takes 3–5s on first open. If stuck, check your connection and reload.</p>
  <button onclick="location.reload()" style="margin-top:12px;padding:8px 18px;border-radius:20px;border:1px solid rgba(255,255,255,.15);background:transparent;color:#8891a4;font-size:12px;cursor:pointer">Reload</button>
</div>
<div class="app" id="app" style="display:none">
  <div class="topbar">
    <div style="flex:1;min-width:0"><h1 id="ltitle">Dynasty HQ</h1><p id="lsub">12-team · Superflex · PPR</p></div>
    <select class="sel" style="width:auto;max-width:130px;font-size:11px" id="tsel" onchange="setMyTeam(this.value)"></select>
  </div>
  <main class="main" id="main"></main>
  <nav class="bottomnav">
    <button class="nav-btn active" data-p="dash" onclick="go('dash')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Home
    </button>
    <button class="nav-btn" data-p="roster" onclick="go('roster')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>Roster
    </button>
    <button class="nav-btn" data-p="league" onclick="go('league')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="9" cy="8" r="3"/><path d="M2 20c0-3 2.7-5 6-5"/><circle cx="16" cy="8" r="3"/><path d="M22 20c0-3-2.7-5-6-5"/><path d="M9 20c0-3 2-5 7-5"/></svg>League
    </button>
    <button class="nav-btn" data-p="trade" onclick="go('trade')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M7 16V4m0 0L3 8m4-4l4 4"/><path d="M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>Trade
    </button>
    <button class="nav-btn" data-p="search" onclick="go('search')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>Search
    </button>
  </nav>
</div>
<script>
// ═══════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════
const LEAGUE_ID = "1313311335559200768";
const SLP  = "https://api.sleeper.app/v1";
const SLP2 = "https://api.sleeper.com";
const FC_URL = "https://api.fantasycalc.com/values/current?isDynasty=true&numQbs=2&numTeams=12&ppr=1";
const ESPN_NEWS = "https://site.api.espn.com/apis/site/v2/sports/football/nfl/news";
const HIST_SEASONS = ["2022","2023","2024"];

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
const S = {
  league:null, rosters:[], users:{}, players:{},
  fcMap:{}, proj:{},
  transactions:[], tradedPicks:[],
  nflState:null,
  myRosterId:null, page:"dash",
  tradeA:[], tradeB:[], tradeTarget:null,
  fcLoaded:false, statsLoaded:false, txnLoaded:false,
  histStats:{},   // pid -> {2022:{...}, 2023:{...}, 2024:{...}}
  newsCache:{},
  lineupRanks:[],
};

// ═══════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════
// Fetch with 10s timeout
const jfetch = (url, ms=10000) => {
  const controller = new AbortController();
  const timer = setTimeout(()=>controller.abort(), ms);
  return fetch(url, {signal:controller.signal})
    .then(r=>{ clearTimeout(timer); if(!r.ok) throw new Error(r.status); return r.json(); })
    .catch(e=>{ clearTimeout(timer); throw e; });
};
const esc = s => (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const posClass = p => { const u=(p||"").toUpperCase().replace(/\d/g,""); return ["QB","RB","WR","TE","K","DEF","DL","LB","DB","IDL","EDGE"].includes(u)?u:"K"; };
const fcVal = pid => S.fcMap[pid]?.value||0;
const ownerName = r => { if(!r) return "?"; const u=S.users[r.owner_id]; return u?.metadata?.team_name||u?.display_name||u?.username||`Team ${r.roster_id}`; };
const rPlayers = r => (r?.players||[]).map(pid=>({player_id:pid,...S.players[pid]}));
const rosterById = id => S.rosters.find(r=>r.roster_id===parseInt(id));
const playerName = pid => S.players[pid]?.full_name||pid;

function valBadge(val){
  if(!val||val<1) return `<span class="vb vNA">—</span>`;
  const c=val>8000?"vS":val>6000?"vA":val>3500?"vB":val>1500?"vC":"vD";
  return `<span class="vb ${c}">${val.toLocaleString()}</span>`;
}
function rankBadge(rank){
  if(!rank||rank>500) return "";
  const c=rank<=10?"vS":rank<=30?"vA":rank<=80?"vB":rank<=150?"vC":"vD";
  return `<span class="vb ${c}">#${rank}</span>`;
}
function trendBadge(t){
  if(!t||Math.abs(t)<5) return "";
  return t>0?`<span class="trend-up">▲${t}</span>`:`<span class="trend-dn">▼${Math.abs(t)}</span>`;
}
function gradeOf(avg){
  if(avg>8000) return{g:"A+",c:"vS"};if(avg>6000) return{g:"A",c:"vA"};
  if(avg>3500) return{g:"B",c:"vB"};if(avg>1500) return{g:"C",c:"vC"};
  return{g:"D",c:"vD"};
}
function showToast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2200); }
function setMsg(m){ const e=document.getElementById("lmsg"); if(e) e.textContent=m; }

// ═══════════════════════════════════════════════════════════
// PPR CALC
// ═══════════════════════════════════════════════════════════
function calcPPR(s){
  if(!s) return 0;
  if(s.pts_ppr) return parseFloat(s.pts_ppr);
  let p=0;
  p+=(s.pass_yd||0)*.04; p+=(s.pass_td||0)*4; p-=(s.pass_int||0)*2;
  p+=(s.rush_yd||0)*.1;  p+=(s.rush_td||0)*6;
  p+=(s.rec||0)*1;       p+=(s.rec_yd||0)*.1; p+=(s.rec_td||0)*6;
  p-=(s.fum_lost||0)*2;
  return parseFloat(p.toFixed(1));
}

// Season-level PPR from accumulated stats
function seasonPPR(pid, season){
  const s=S.histStats[pid]?.[season];
  return s ? calcPPR(s) : null;
}

// ═══════════════════════════════════════════════════════════
// OPTIMAL LINEUP VALUE
// ═══════════════════════════════════════════════════════════
function optimalLineupValue(roster){
  const pl=rPlayers(roster);
  const byPos={QB:[],RB:[],WR:[],TE:[]};
  pl.forEach(p=>{ const pos=(p.position||"").toUpperCase(); if(byPos[pos]) byPos[pos].push({pid:p.player_id,val:fcVal(p.player_id)}); });
  Object.values(byPos).forEach(a=>a.sort((a,b)=>b.val-a.val));
  const qbs=byPos.QB.slice(0,2), rbs=byPos.RB.slice(0,2), wrs=byPos.WR.slice(0,3), tes=byPos.TE.slice(0,1);
  const used=new Set([...qbs,...rbs,...wrs,...tes].map(p=>p.pid));
  const flex=[...byPos.RB.slice(2),...byPos.WR.slice(3),...byPos.TE.slice(1)].filter(p=>!used.has(p.pid)).sort((a,b)=>b.val-a.val).slice(0,1);
  return [...qbs,...rbs,...wrs,...tes,...flex].reduce((s,p)=>s+p.val,0);
}

function computeLineupRanks(){
  if(!S.fcLoaded||!S.rosters.length) return;
  S.lineupRanks=[...S.rosters].map(r=>({
    roster_id:r.roster_id, name:ownerName(r),
    lineupVal:optimalLineupValue(r),
    totalVal:rPlayers(r).reduce((s,p)=>s+fcVal(p.player_id),0),
    wins:r.settings?.wins||0, losses:r.settings?.losses||0,
  })).sort((a,b)=>b.lineupVal-a.lineupVal);
}

// ═══════════════════════════════════════════════════════════
// RULE-BASED TEAM ANALYSIS
// ═══════════════════════════════════════════════════════════
function buildTeamAnalysis(roster){
  const pl=rPlayers(roster);
  if(!pl.length||!S.fcLoaded) return null;
  const byPos={QB:[],RB:[],WR:[],TE:[]};
  pl.forEach(p=>{ const pos=(p.position||"").toUpperCase(); if(byPos[pos]) byPos[pos].push(p); });
  Object.values(byPos).forEach(a=>a.sort((b,c)=>fcVal(c.player_id)-fcVal(b.player_id)));

  const top10=[...pl].sort((a,b)=>fcVal(b.player_id)-fcVal(a.player_id)).slice(0,10);
  const ages=top10.map(p=>p.age||(p.birth_date?Math.floor((Date.now()-new Date(p.birth_date))/31557600000):null)).filter(Boolean);
  const avgAge=ages.length?ages.reduce((a,b)=>a+b,0)/ages.length:0;
  const lineupVal=optimalLineupValue(roster);
  const lrank=(S.lineupRanks.findIndex(r=>r.roster_id===roster.roster_id)+1)||0;
  const totalVal=pl.reduce((s,p)=>s+fcVal(p.player_id),0);
  const qb1=byPos.QB[0], qb2=byPos.QB[1];
  const qbVal=(fcVal(qb1?.player_id)||0)+(fcVal(qb2?.player_id)||0);
  const wrVal=byPos.WR.slice(0,3).reduce((s,p)=>s+fcVal(p.player_id),0);
  const rbVal=byPos.RB.slice(0,2).reduce((s,p)=>s+fcVal(p.player_id),0);
  const teVal=fcVal(byPos.TE[0]?.player_id)||0;
  const netTrend=top10.reduce((s,p)=>s+(S.fcMap[p.player_id]?.trend30||0),0);

  // Recent production (2024 PPR)
  const top5prod=[...pl].sort((a,b)=>fcVal(b.player_id)-fcVal(a.player_id)).slice(0,5);
  const avgProd2024=top5prod.map(p=>seasonPPR(p.player_id,"2024")).filter(v=>v!==null);
  const hasProd=avgProd2024.length>0;

  // Determine mode
  let mode, modeColor;
  if(avgAge<24.5&&lineupVal<32000){mode="🔨 Full Rebuild";modeColor="var(--red)";}
  else if(avgAge<25.5&&lineupVal<45000){mode="📈 Rebuilding";modeColor="var(--amber)";}
  else if(avgAge>=27.5&&lineupVal>55000){mode="🏆 Win Now";modeColor="var(--purple)";}
  else if(avgAge>=26&&lineupVal>45000){mode="⚡ Contender";modeColor="var(--accent)";}
  else{mode="⚖️ Transitional";modeColor="var(--teal)";}

  // Build paragraphs
  const qbStr=qb1?`${qb1.full_name||"QB1"}${qb2?" & "+(qb2.full_name||"QB2"):""}`:null;
  const wrStr=byPos.WR.slice(0,2).map(p=>p.full_name?.split(" ").pop()||"").filter(Boolean).join(" / ")||null;
  const rbStr=byPos.RB.slice(0,2).map(p=>p.full_name?.split(" ").pop()||"").filter(Boolean).join(" / ")||null;

  // Para 1: Outlook
  let p1="";
  if(mode.includes("Rebuild")){
    p1=`This is a ${mode.toLowerCase().replace(/[🔨📈]/,"").trim()} team with an average core age of ${avgAge.toFixed(1)} years. Your starting lineup ranks #${lrank||"?"} in the league by FantasyCalc SF value (${lineupVal.toLocaleString()} total). The priority right now should be acquiring young talent and future draft capital rather than chasing marginal playoff spots.`;
  } else if(mode.includes("Win Now")){
    p1=`This is a win-now team. Your core averages ${avgAge.toFixed(1)} years old — the window is open but won't last forever. Starting lineup value ranks #${lrank||"?"} in the league (${lineupVal.toLocaleString()}). Every move you make should be optimizing for a championship in the next 1–2 seasons, not 3–5 years from now.`;
  } else if(mode.includes("Contender")){
    p1=`This is a legitimate contender. Core age of ${avgAge.toFixed(1)} with a starting lineup that ranks #${lrank||"?"} in the league (${lineupVal.toLocaleString()}). You have both a competitive window now and some long-term upside — a rare combination in dynasty.`;
  } else {
    p1=`This is a transitional roster with a ${avgAge.toFixed(1)}-year average core age and starting lineup value ranked #${lrank||"?"} in the league (${lineupVal.toLocaleString()}). You're neither clearly rebuilding nor clearly contending — the right move or two could tip things significantly in either direction.`;
  }

  // Para 2: Positional breakdown
  let p2Parts=[];
  if(qbStr) p2Parts.push(`QB room (${qbStr}, combined SF value: ${qbVal.toLocaleString()}) is your ${qbVal>14000?"biggest strength":"biggest need in superflex"}.`);
  if(wrVal>18000) p2Parts.push(`WR corps is elite led by ${wrStr||"top receivers"}.`);
  else if(wrVal<10000) p2Parts.push(`WR is thin (${wrVal.toLocaleString()} combined top-3) — a clear area to upgrade.`);
  if(rbVal>12000) p2Parts.push(`RB depth is strong with ${rbStr||"a solid backfield"}.`);
  else if(rbVal<6000) p2Parts.push(`RB corps is a weakness — consider targeting a bellcow.`);
  if(teVal>6000) p2Parts.push(`Elite TE (${byPos.TE[0]?.full_name||""}) gives a positional advantage.`);
  else if(teVal<2000) p2Parts.push(`TE is a streaming spot — not a dynasty concern but worth monitoring.`);
  const p2=p2Parts.join(" ")||"Positional breakdown looks balanced across the roster.";

  // Para 3: Trend & recommendation
  let p3="";
  if(netTrend>500) p3=`Your top assets are trending up collectively (+${netTrend} over 30 days on FantasyCalc), suggesting the league is bullish on your core. `;
  else if(netTrend<-500) p3=`Your top assets have lost value recently (${netTrend} combined 30-day trend) — worth monitoring whether this is a temporary dip or a structural concern. `;

  // Recommend biggest move
  if(mode.includes("Win Now")||mode.includes("Contender")){
    if(qbVal<10000) p3+=`Priority move: upgrade your QB room. In superflex, elite QBs are worth overpaying for.`;
    else if(wrVal<14000) p3+=`Priority move: add a WR1-caliber weapon — your passing game support needs a boost.`;
    else p3+=`You're well-built. Look to add depth at RB or trade future picks for proven contributors.`;
  } else {
    p3+=`Focus on acquiring 2026–2027 draft picks and targeting players on the age curve (22–24) that contenders might move for production.`;
  }

  // Strengths / concerns
  const strengths=[], concerns=[];
  if(qbVal>14000) strengths.push(`Elite QB room`);
  else if(qbVal<6000) concerns.push(`Weak QB room`);
  if(wrVal>18000) strengths.push(`Deep WR corps`);
  else if(wrVal<9000) concerns.push(`Thin at WR`);
  if(rbVal>12000) strengths.push(`Strong RB depth`);
  else if(rbVal<5000) concerns.push(`RB is a weakness`);
  if(teVal>6000) strengths.push(`Elite TE advantage`);
  if(netTrend>400) strengths.push(`Assets trending ▲`);
  if(netTrend<-400) concerns.push(`Assets trending ▼`);
  if(byPos.QB.length<2) concerns.push(`Only 1 QB — risky`);
  if(lrank<=3) strengths.push(`Top-3 lineup power`);
  if(lrank>=10) concerns.push(`Bottom-3 lineup power`);

  return {mode,modeColor,p1,p2,p3,strengths,concerns,avgAge:avgAge.toFixed(1),lineupVal,lrank,totalVal,netTrend,qbVal};
}

// RULE-BASED PLAYER SCOUTING
// ═══════════════════════════════════════════════════════════
function buildScoutReport(pid){
  const p=S.players[pid];
  if(!p) return null;
  const fc=S.fcMap[pid];
  const pos=(p.position||"").toUpperCase();
  const age=p.age||(p.birth_date?Math.floor((Date.now()-new Date(p.birth_date))/31557600000):null)||0;
  const yoe=p.years_exp!=null?parseInt(p.years_exp):null;
  const val=fc?.value||0;
  const rank=fc?.rank||9999;
  const trend=fc?.trend30||0;

  // Historical PPR
  const ppr22=seasonPPR(pid,"2022"), ppr23=seasonPPR(pid,"2023"), ppr24=seasonPPR(pid,"2024");
  const latestPPR=ppr24||ppr23||ppr22;
  const hasHistory=ppr22!==null||ppr23!==null||ppr24!==null;

  // Production trajectory
  let prodTrend="stable";
  if(ppr23!==null&&ppr24!==null){
    const delta=ppr24-ppr23;
    if(delta>30) prodTrend="rising";
    else if(delta<-30) prodTrend="declining";
  }

  // Age curve analysis
  const ageCurves={QB:{peak:[27,34],prime:[25,35]},RB:{peak:[23,26],prime:[22,28]},WR:{peak:[24,29],prime:[22,31]},TE:{peak:[26,30],prime:[24,32]}};
  const curve=ageCurves[pos]||ageCurves.WR;
  const inPeak=age>=curve.peak[0]&&age<=curve.peak[1];
  const inPrime=age>=curve.prime[0]&&age<=curve.prime[1];
  const prePeak=age<curve.peak[0];
  const postPeak=age>curve.peak[1];

  // Build verdict
  let verdict, verdictClass;
  if(val===0||rank>400){
    verdict="HOLD"; verdictClass="hold";
  } else if(prePeak&&val>2000&&trend>=0){
    verdict="BUY"; verdictClass="buy";
  } else if(postPeak&&prodTrend==="declining"&&age>30){
    verdict="SELL"; verdictClass="sell";
  } else if(prodTrend==="rising"&&val>2000){
    verdict="BUY"; verdictClass="buy";
  } else if(trend<-200&&postPeak){
    verdict="SELL"; verdictClass="sell";
  } else {
    verdict="HOLD"; verdictClass="hold";
  }

  // Para 1: Current situation
  let s1="";
  if(val>6000) s1=`${p.full_name} is an elite dynasty asset ranked #${rank} overall (SF value: ${val.toLocaleString()}). `;
  else if(val>3000) s1=`${p.full_name} is a solid dynasty contributor ranked #${rank} overall (SF value: ${val.toLocaleString()}). `;
  else if(val>0) s1=`${p.full_name} has modest dynasty value at #${rank} overall (SF value: ${val.toLocaleString()}). `;
  else s1=`${p.full_name} is currently unranked or outside the top-500 on FantasyCalc. `;

  if(hasHistory){
    const parts=[];
    if(ppr22!==null) parts.push(`2022: ${ppr22.toFixed(0)} pts`);
    if(ppr23!==null) parts.push(`2023: ${ppr23.toFixed(0)} pts`);
    if(ppr24!==null) parts.push(`2024: ${ppr24.toFixed(0)} pts`);
    s1+=`Season PPR totals — ${parts.join(", ")}. `;
    if(prodTrend==="rising") s1+=`Production is trending upward, a positive dynasty signal.`;
    else if(prodTrend==="declining") s1+=`Production has declined recently, which is worth monitoring.`;
    else s1+=`Production has been relatively consistent.`;
  }

  // Para 2: Age curve
  let s2="";
  const yrsToPeak=Math.max(0,curve.peak[0]-age);
  if(prePeak){
    s2=`At ${age} years old, ${p.full_name?.split(" ")[0]} is ${yrsToPeak>0?`still ${yrsToPeak} year${yrsToPeak>1?"s":""} away from their peak window (${curve.peak[0]}–${curve.peak[1]})`:` just entering their peak window`}. This is the ideal dynasty age — you can expect improvement as they mature. `;
    if(yoe!==null&&yoe<=1) s2+=`As a player with only ${yoe===0?"no NFL experience yet":"1 year of NFL experience"}, upside is high but development is not guaranteed.`;
    else s2+=`The best years should still be ahead.`;
  } else if(inPeak){
    s2=`At ${age}, ${p.full_name?.split(" ")[0]} is right in their peak window (${curve.peak[0]}–${curve.peak[1]} for ${pos}). What you see is what you get — this is the prime of their dynasty value, and it will hold for a few more seasons.`;
  } else {
    const yrsPost=age-curve.peak[1];
    s2=`At ${age}, ${p.full_name?.split(" ")[0]} is ${yrsPost} year${yrsPost>1?"s":""} past the typical ${pos} peak (${curve.peak[0]}–${curve.peak[1]}). `;
    s2+=age>32?`Age-related decline is a real risk, and dynasty value will likely continue to erode. Sell windows are typically better than hold windows at this stage.`:`There may be 1–2 more productive seasons, but the long-term dynasty outlook dims each year.`;
  }

  // Para 3: Verdict
  let s3="";
  if(verdict==="BUY"){
    s3=`Verdict: BUY. `;
    if(prePeak) s3+=`Young age curve + strong value makes this an ideal target. If you can acquire them at or near current market value, you're getting a player who should be worth more in 12–18 months.`;
    else s3+=`Rising production and positive trend suggest the market may be undervaluing this player. A good time to acquire.`;
  } else if(verdict==="SELL"){
    s3=`Verdict: SELL. `;
    s3+=`The combination of age, declining production, and negative trends suggests the best value-maximizing move is to sell for a younger player or draft capital. Don't let dynasty nostalgia hold you back.`;
  } else {
    s3=`Verdict: HOLD. `;
    if(inPeak) s3+=`In their peak window with stable value — not a sell unless you're getting an elite return. Not a buy unless at a discount.`;
    else s3+=`No compelling reason to move in either direction. Monitor their situation and revisit if circumstances change.`;
  }

  if(Math.abs(trend)>=50){
    s3+=` Note: 30-day FC trend is ${trend>0?`+${trend} (rising)`:`${trend} (falling)`}.`;
  }

  return {verdict,verdictClass,s1,s2,s3,ppr22,ppr23,ppr24,prodTrend,age,inPeak,prePeak,postPeak};
}

// ═══════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════
async function boot(){
  setMsg("Connecting to Sleeper…");

  // Helper: retry a fetch up to N times
  async function tryFetch(url, retries=2){
    for(let i=0;i<=retries;i++){
      try{ return await jfetch(url); }
      catch(e){ if(i===retries) throw e; await new Promise(r=>setTimeout(r,1500)); }
    }
  }

  // Show the app shell immediately with a loading state
  // Then load each piece independently — nothing blocks the UI
  let leagueOk=false;

  // Try league + rosters + users — these are small and fast
  try{
    setMsg("Loading league…");
    const [lg,rs,uArr] = await Promise.all([
      tryFetch(`${SLP}/league/${LEAGUE_ID}`),
      tryFetch(`${SLP}/league/${LEAGUE_ID}/rosters`),
      tryFetch(`${SLP}/league/${LEAGUE_ID}/users`),
    ]);
    S.league=lg; S.rosters=rs;
    const uMap={}; uArr.forEach(u=>{ uMap[u.user_id]=u; }); S.users=uMap;
    S.myRosterId=rs[0]?.roster_id;
    leagueOk=true;

    document.getElementById("ltitle").textContent=lg.name||"Dynasty HQ";
    document.getElementById("lsub").textContent=`12-team · Superflex · PPR`;
    const sel=document.getElementById("tsel");
    rs.forEach(r=>{ const o=document.createElement("option"); o.value=r.roster_id; o.textContent=ownerName(r); sel.appendChild(o); });
  }catch(e){
    // Even if league load fails, show the app with an error state
    setMsg("⚠ Could not load league: "+e.message+". Tap to retry.");
    document.getElementById("lmsg").onclick=()=>{ location.reload(); };
  }

  // Show app regardless
  document.getElementById("loading").style.display="none";
  document.getElementById("app").style.display="flex";
  render();

  if(!leagueOk) return;

  // All remaining loads are fully independent — failures don't affect each other
  // FC values: fast, high priority
  loadFC();

  // Players DB: large (~8MB), load with longer timeout, no retry on mobile
  setTimeout(()=>{
    fetch(`${SLP}/players/nfl`)
      .then(r=>r.ok?r.json():null)
      .then(ps=>{ if(ps){ S.players=ps; render(); loadHistStats(); } })
      .catch(e=>console.warn("Players DB failed (will retry):",e));
  }, 300);

  // NFL state + projections: medium priority
  setTimeout(()=>{
    jfetch(`${SLP}/state/nfl`,15000)
      .then(nfl=>{ S.nflState=nfl; loadCurrentProj(nfl); })
      .catch(()=>{});
  }, 500);

  // Transactions + picks: low priority, delay so they don't compete
  setTimeout(()=>{
    loadTxns();
    jfetch(`${SLP}/league/${LEAGUE_ID}/traded_picks`,8000)
      .then(d=>{ S.tradedPicks=d; render(); })
      .catch(()=>{});
  }, 3000);
}

async function loadFC(){
  try{
    const data=await jfetch(FC_URL);
    const map={};
    data.forEach(item=>{ const pid=item.player?.sleeperId; if(pid) map[pid]={value:item.value||0,rank:item.overallRank||9999,posRank:item.positionRank||9999,trend30:item.trend30Day||0}; });
    S.fcMap=map; S.fcLoaded=true;
    computeLineupRanks();
    render();
  }catch(e){ console.warn("FC",e); }
}

async function loadCurrentProj(nfl){
  try{
    const wk=Math.min(nfl.week||1,18);
    const proj=await fetch(`${SLP2}/projections/nfl/2024/${wk}?season_type=regular&position[]=QB&position[]=RB&position[]=WR&position[]=TE`).then(r=>r.ok?r.json():{});
    S.proj=proj||{}; render();
  }catch(e){ console.warn("Proj",e); }
}

// Load historical season stats — my roster first, then others
async function loadHistStats(){
  const myR = rosterById(S.myRosterId)||S.rosters[0];
  const myPids = myR?.players||[];
  const otherPids = [...new Set(S.rosters.flatMap(r=>r.roster_id!==S.myRosterId?r.players||[]:[])) ];
  // Load my players first, then everyone else
  const ordered = [...myPids, ...otherPids.filter(p=>!myPids.includes(p))];

  for(const season of HIST_SEASONS){
    // Small chunks of 5 to be gentle on mobile connections
    for(let i=0;i<ordered.length;i+=5){
      const chunk=ordered.slice(i,i+5);
      await Promise.all(chunk.map(async pid=>{
        try{
          const ctrl=new AbortController();
          const t=setTimeout(()=>ctrl.abort(),5000);
          const r=await fetch(`${SLP2}/stats/nfl/player/${pid}?season_type=regular&season=${season}&grouping=season`,{signal:ctrl.signal});
          clearTimeout(t);
          const data=r.ok?await r.json():null;
          if(data&&data.stats){
            if(!S.histStats[pid]) S.histStats[pid]={};
            S.histStats[pid][season]=data.stats;
          }
        }catch(_){}
      }));
      // Small delay between chunks to avoid saturating mobile connection
      if(i%20===0&&i>0) await new Promise(r=>setTimeout(r,200));
    }
    S.statsLoaded=true;
    render();
  }
}

async function loadTxns(){
  try{
    const nfl=S.nflState||await jfetch(`${SLP}/state/nfl`);
    const weeks=Math.min(nfl.leg||1,18);
    const all=[];
    for(let w=1;w<=weeks;w+=4){
      const batch=[];
      for(let b=w;b<Math.min(w+4,weeks+1);b++) batch.push(jfetch(`${SLP}/league/${LEAGUE_ID}/transactions/${b}`).catch(()=>[]));
      const res=await Promise.all(batch);
      res.forEach(arr=>{ if(Array.isArray(arr)) all.push(...arr); });
    }
    S.transactions=all.filter(t=>t.status==="complete").sort((a,b)=>(b.status_updated||0)-(a.status_updated||0));
    S.txnLoaded=true; render();
  }catch(e){ console.warn("Txns",e); }
}

// ESPN news
async function fetchPlayerNews(pid){
  if(S.newsCache[pid]!==undefined) return S.newsCache[pid];
  S.newsCache[pid]=null;
  const p=S.players[pid]||{};
  const espnId=p.espn_id||p.stats_id;
  if(!espnId){ S.newsCache[pid]=[]; return []; }
  try{
    const d=await fetch(`${ESPN_NEWS}?athlete=${espnId}&limit=5`).then(r=>r.ok?r.json():null);
    const articles=(d?.articles||[]).slice(0,4).map(a=>({headline:a.headline||"",desc:a.description||"",date:a.published?new Date(a.published).toLocaleDateString("en-US",{month:"short",day:"numeric"}):""}));
    S.newsCache[pid]=articles; return articles;
  }catch(e){ S.newsCache[pid]=[]; return []; }
}

    <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--accent);margin-bottom:5px">⚡ Team Analysis</div>

    ${analysis.concerns.length?`<div style="font-size:11px;color:var(--amber);font-weight:600">⚠ ${analysis.concerns.join(" · ")}</div>`:""}
  </div>`:S.fcLoaded?"":
  `<div class="card"><div class="ctitle">Team Analysis</div><div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text3)"><div class="spin spin-sm"></div>Loading FantasyCalc values…</div></div>`}

  <div class="card">

    return `<div class="srow ${isMe?"me":""}"><span class="srank">#${i+1}</span><span class="sname">${esc(ownerName(r))}${isMe?`<span class="ytag">YOU</span>`:""}</span><span class="srec">${rw}–${rl}</span><span class="spts">${pts}</span></div>`;}).join("")}

// ROSTER
// ═══════════════════════════════════════════════════════════
function renderRoster(){
  const myR=rosterById(S.myRosterId)||S.rosters[0];
  const all=rPlayers(myR);
  const byPos={};
  all.forEach(p=>{ const pos=(p.position||p.fantasy_positions?.[0]||"?").toUpperCase(); byPos[pos]=(byPos[pos]||0)+1; });
  const pf=window._pf||"ALL",sm=window._sm||"value";
  const filtered=pf==="ALL"?all:all.filter(p=>(p.position||p.fantasy_positions?.[0]||"").toUpperCase()===pf);
  const sortedPl=[...filtered].sort((a,b)=>{
    if(sm==="value") return fcVal(b.player_id)-fcVal(a.player_id);
    if(sm==="rank") return (S.fcMap[a.player_id]?.rank||9999)-(S.fcMap[b.player_id]?.rank||9999);
    if(sm==="pts24") return (seasonPPR(b.player_id,"2024")||0)-(seasonPPR(a.player_id,"2024")||0);
    if(sm==="pts23") return (seasonPPR(b.player_id,"2023")||0)-(seasonPPR(a.player_id,"2023")||0);
    return (parseInt(b.birth_date?.split("-")[0]||"1990"))-(parseInt(a.birth_date?.split("-")[0]||"1990"));
  });
  const myPicks=S.tradedPicks.filter(pk=>pk.owner_id===myR?.roster_id);
  const gonePicks=S.tradedPicks.filter(pk=>pk.roster_id===myR?.roster_id&&pk.owner_id!==myR?.roster_id);
  const targets={QB:2,RB:6,WR:8,TE:2};
  return `
  <div class="grid4">${["QB","RB","WR","TE"].map(p=>`<div class="metric" style="padding:8px 9px"><div class="mlabel">${p}</div><div class="mval" style="font-size:18px">${byPos[p]||0}</div></div>`).join("")}</div>
  <div class="filters">
    ${["ALL","QB","RB","WR","TE"].map(p=>`<button class="btn btn-sm ${pf===p?"on":""}" onclick="window._pf='${p}';render()">${p}</button>`).join("")}
    <div style="margin-left:auto;display:flex;gap:4px">
      ${[["value","Val"],["rank","Rank"],["pts24","'24"],["pts23","'23"],["age","Age"]].map(([k,l])=>`<button class="btn btn-sm ${sm===k?"on":""}" onclick="window._sm='${k}';render()">${l}</button>`).join("")}
    </div>
  </div>
  <div class="card">
    <div class="ctitle">${esc(ownerName(myR))} · ${all.length} players</div>
    ${sortedPl.map(p=>prow(p,{showVal:true,showRank:sm==="rank",showProd:sm==="pts24"||sm==="pts23",prodYear:sm==="pts23"?"2023":"2024",showTrend:true,clickable:true})).join("")}
    ${!sortedPl.length?`<div class="empty">No players</div>`:""}
  </div>
  ${myPicks.length?`<div class="card"><div class="ctitle">Picks You Own</div>${myPicks.sort((a,b)=>a.season-b.season||a.round-b.round).map(pk=>`<div class="prow"><span class="pkbadge">${pk.season} R${pk.round}</span><span class="pname" style="font-size:12px;color:var(--text2)">via ${esc(ownerName(rosterById(pk.roster_id)))}</span></div>`).join("")}</div>`:""}
  ${gonePicks.length?`<div class="card"><div class="ctitle">Picks Traded Away</div>${gonePicks.sort((a,b)=>a.season-b.season||a.round-b.round).map(pk=>`<div class="prow"><span class="pkbadge" style="background:rgba(242,92,84,.1);color:var(--red)">${pk.season} R${pk.round}</span><span class="pname" style="font-size:12px;color:var(--text2)">to ${esc(ownerName(rosterById(pk.owner_id)))}</span></div>`).join("")}</div>`:""}
  <div class="card"><div class="ctitle">Depth Needs</div>
    ${Object.entries(targets).map(([pos,target])=>{ const have=byPos[pos]||0; const pct=Math.min(100,Math.round((have/target)*100)); const color=have>=target?"#3ecf8e":have>=(target*.7)?"#f6a623":"#f25c54";
    return `<div class="prog-wrap"><span class="pos ${pos}" style="width:28px">${pos}</span><div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${color}"></div></div><span style="font-size:11px;font-family:'DM Mono',monospace;color:var(--text2);min-width:28px;text-align:right">${have}/${target}</span></div>`;}).join("")}
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// LEAGUE
// ═══════════════════════════════════════════════════════════
function renderLeague(){
  const tab=window._ltab||"rankings";
  return `<div class="filters" style="margin-bottom:11px">
    <button class="btn ${tab==="rankings"?"on":""}" onclick="window._ltab='rankings';render()">Rankings</button>
    <button class="btn ${tab==="rosters"?"on":""}" onclick="window._ltab='rosters';render()">Rosters</button>
    <button class="btn ${tab==="trades"?"on":""}" onclick="window._ltab='trades';render()">Trades</button>
    <button class="btn ${tab==="moves"?"on":""}" onclick="window._ltab='moves';render()">Moves</button>
  </div>
  ${tab==="rankings"?renderRankings():tab==="rosters"?renderAllRosters():tab==="trades"?renderTrades():renderMoves()}`;
}

function renderRankings(){
  if(!S.fcLoaded) return `<div class="empty"><div class="spin" style="margin:0 auto 10px"></div>Loading values…</div>`;
  const myR=rosterById(S.myRosterId)||S.rosters[0];
  const maxLV=S.lineupRanks[0]?.lineupVal||1;
  const allTV=S.rosters.map(r=>rPlayers(r).reduce((s,p)=>s+fcVal(p.player_id),0));
  const maxTV=Math.max(...allTV)||1;
  const tvSorted=[...S.rosters].map(r=>({r,tv:rPlayers(r).reduce((s,p)=>s+fcVal(p.player_id),0)})).sort((a,b)=>b.tv-a.tv);

  return `
  <div class="card">
    <div class="ctitle">Optimal Lineup Power Rankings</div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:10px">Best 2QB+2RB+3WR+1TE+FLEX — FantasyCalc SF values</div>
    ${S.lineupRanks.map((r,i)=>{ const isMe=r.roster_id===myR?.roster_id; const bar=Math.round((r.lineupVal/maxLV)*100);
    return `<div class="rank-row ${isMe?"hl":""}">
      <span style="font-size:11px;color:var(--text3);width:20px;font-family:'DM Mono',monospace">#${i+1}</span>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:5px;margin-bottom:3px">
          <span style="font-size:13px;font-weight:${isMe?600:400};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.name)}${isMe?`<span class="ytag">YOU</span>`:""}</span>
          <span style="font-size:11px;color:var(--text2);margin-left:auto;flex-shrink:0">${r.wins}–${r.losses}</span>
        </div>
        <div class="prog-bar" style="height:3px"><div class="prog-fill" style="width:${bar}%;background:${isMe?"var(--accent)":"var(--text3)"}"></div></div>
      </div>
      <span style="font-size:11px;font-family:'DM Mono',monospace;color:${isMe?"var(--accent)":"var(--text2)"};min-width:52px;text-align:right">${r.lineupVal.toLocaleString()}</span>
    </div>`; }).join("")}
  </div>
  <div class="card">
    <div class="ctitle">Total Roster Value Rankings</div>
    ${tvSorted.map(({r,tv},i)=>{ const isMe=r.roster_id===myR?.roster_id; const bar=Math.round((tv/maxTV)*100);
    return `<div class="rank-row ${isMe?"hl":""}">
      <span style="font-size:11px;color:var(--text3);width:20px;font-family:'DM Mono',monospace">#${i+1}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:${isMe?600:400};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px">${esc(ownerName(r))}${isMe?`<span class="ytag">YOU</span>`:""}</div>
        <div class="prog-bar" style="height:3px"><div class="prog-fill" style="width:${bar}%;background:${isMe?"var(--accent)":"var(--text3)"}"></div></div>
      </div>
      <span style="font-size:11px;font-family:'DM Mono',monospace;color:${isMe?"var(--accent)":"var(--text2)"};min-width:52px;text-align:right">${tv.toLocaleString()}</span>
    </div>`; }).join("")}
  </div>`;
}

function renderAllRosters(){
  return [...S.rosters].sort((a,b)=>(b.settings?.wins||0)-(a.settings?.wins||0)).map(r=>{
    const pl=rPlayers(r); const tv=pl.reduce((s,p)=>s+fcVal(p.player_id),0);
    const grade=gradeOf(pl.length?tv/pl.length:0);
    const isOpen=window._openR===r.roster_id;
    return `<div class="card" style="padding:10px 12px">
      <div style="display:flex;align-items:center;gap:8px;cursor:pointer" onclick="window._openR=${isOpen?null:r.roster_id};render()">
        <span style="flex:1;font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(ownerName(r))}</span>
        <span style="font-size:12px;color:var(--text2)">${r.settings?.wins||0}–${r.settings?.losses||0}</span>
        ${tv>0?`<span style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace">${tv.toLocaleString()}</span>`:""}
        <span class="vb ${grade.c}">${grade.g}</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2">${isOpen?`<path d="M18 15l-6-6-6 6"/>`:`<path d="M6 9l6 6 6-6"/>`}</svg>
      </div>
      ${isOpen?`<div style="margin-top:9px;padding-top:9px;border-top:1px solid var(--border)">${[...pl].sort((a,b)=>fcVal(b.player_id)-fcVal(a.player_id)).map(p=>prow(p,{showVal:true,showRank:true})).join("")}</div>`:""}
    </div>`;
  }).join("");
}

function renderTrades(){
  if(!S.txnLoaded) return `<div class="empty"><div class="spin" style="margin:0 auto 10px"></div>Loading…</div>`;
  const trades=S.transactions.filter(t=>t.type==="trade");
  if(!trades.length) return `<div class="empty">No trades found</div>`;
  return trades.slice(0,40).map(t=>{
    const date=t.status_updated?new Date(t.status_updated).toLocaleDateString("en-US",{month:"short",day:"numeric"}):"";
    const sides={}; (t.roster_ids||[]).forEach(rid=>{ sides[rid]={adds:[],picks:[]}; });
    if(t.adds) Object.entries(t.adds).forEach(([pid,rid])=>{ if(sides[rid]) sides[rid].adds.push(pid); });
    (t.draft_picks||[]).forEach(pk=>{ if(sides[pk.owner_id]) sides[pk.owner_id].picks.push(`${pk.season} R${pk.round}`); });
    return `<div class="txn">
      <div class="txnhead"><span class="txntype txn-trade">Trade</span><span style="font-size:11px;color:var(--text2)">Wk ${t.leg||"?"}</span><span class="txndate">${date}</span></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        ${(t.roster_ids||[]).slice(0,2).map(rid=>{ const side=sides[rid]||{adds:[],picks:[]};
          return `<div><div style="font-size:10px;font-weight:600;color:var(--text3);margin-bottom:4px">${esc(ownerName(rosterById(rid)))} gets</div>
          ${side.adds.map(pid=>`<div style="display:flex;align-items:center;gap:5px;padding:2px 0"><span class="pos ${posClass(S.players[pid]?.position||"")}" style="font-size:9px;padding:1px 4px;min-width:22px">${S.players[pid]?.position||"?"}</span><span style="font-size:12px">${esc(playerName(pid))}</span>${fcVal(pid)?`<span style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-left:auto">${fcVal(pid).toLocaleString()}</span>`:""}</div>`).join("")}
          ${side.picks.map(pk=>`<div style="padding:2px 0"><span class="pkbadge" style="font-size:10px">${pk}</span></div>`).join("")}
          ${!side.adds.length&&!side.picks.length?`<span style="font-size:11px;color:var(--text3)">—</span>`:""}</div>`;}).join("")}
      </div>
    </div>`;
  }).join("");
}

function renderMoves(){
  if(!S.txnLoaded) return `<div class="empty"><div class="spin" style="margin:0 auto 10px"></div>Loading…</div>`;
  const moves=S.transactions.filter(t=>t.type!=="trade").slice(0,50);
  if(!moves.length) return `<div class="empty">No moves found</div>`;
  return moves.map(t=>{
    const date=t.status_updated?new Date(t.status_updated).toLocaleDateString("en-US",{month:"short",day:"numeric"}):"";
    const rid=(t.roster_ids||[])[0];
    const adds=Object.keys(t.adds||{}),drops=Object.keys(t.drops||{});
    return `<div class="txn">
      <div class="txnhead"><span class="txntype ${t.type==="waiver"?"txn-waiver":"txn-add"}">${t.type==="waiver"?"Waiver":"FA"}</span><span style="font-size:11px;color:var(--text2)">${esc(ownerName(rosterById(rid)))}</span><span class="txndate">${date}</span></div>
      ${adds.map(pid=>`<div style="display:flex;align-items:center;gap:5px;padding:2px 0"><span style="font-size:10px;color:var(--green);font-weight:700">+</span><span class="pos ${posClass(S.players[pid]?.position||"")}" style="font-size:9px;padding:1px 4px">${S.players[pid]?.position||"?"}</span><span style="font-size:12px">${esc(playerName(pid))}</span></div>`).join("")}
      ${drops.map(pid=>`<div style="display:flex;align-items:center;gap:5px;padding:2px 0"><span style="font-size:10px;color:var(--red);font-weight:700">−</span><span class="pos ${posClass(S.players[pid]?.position||"")}" style="font-size:9px;padding:1px 4px">${S.players[pid]?.position||"?"}</span><span style="font-size:12px;color:var(--text2)">${esc(playerName(pid))}</span></div>`).join("")}
    </div>`;
  }).join("");
}

// ═══════════════════════════════════════════════════════════
// TRADE
// ═══════════════════════════════════════════════════════════
function renderTrade(){
  const myR=rosterById(S.myRosterId)||S.rosters[0];
  const myPl=rPlayers(myR);
  const theirR=S.tradeTarget?rosterById(S.tradeTarget):null;
  const theirPl=theirR?rPlayers(theirR):[];
  const qA=window._tqA||"",qB=window._tqB||"";
  const filt=(pl,q)=>q?pl.filter(p=>(p.full_name||"").toLowerCase().includes(q.toLowerCase())):pl;
  const vA=S.tradeA.reduce((s,pid)=>s+fcVal(pid),0);
  const vB=S.tradeB.reduce((s,pid)=>s+fcVal(pid),0);
  const diff=vA-vB;
  return `
  <div style="margin-bottom:10px">
    <label style="font-size:10px;color:var(--text3);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em">Trading With</label>
    <select class="sel" onchange="S.tradeTarget=parseInt(this.value)||null;S.tradeB=[];window._tqB='';render()">
      <option value="">Select a team…</option>
      ${S.rosters.filter(r=>r.roster_id!==S.myRosterId).map(r=>`<option value="${r.roster_id}" ${S.tradeTarget==r.roster_id?"selected":""}>${esc(ownerName(r))}</option>`).join("")}
    </select>
  </div>
  <div class="tgrid">
    ${[["You Send",myPl,S.tradeA,"A",qA,"_tqA"],["You Receive",theirPl,S.tradeB,"B",qB,"_tqB"]].map(([title,pl,sel,side,q,qk])=>`
    <div class="tside"><h3>${title}</h3>
      <input class="inp" style="font-size:12px;padding:6px 9px;margin-bottom:7px" placeholder="Search…" value="${esc(q)}" oninput="window.${qk}=this.value;render()"/>
      <div class="tlist">
        ${side==="B"&&!S.tradeTarget?`<p style="font-size:11px;color:var(--text3)">Select a team above</p>`:
          filt(pl,q).map(p=>`<label class="tchk">
            <input type="checkbox" ${sel.includes(p.player_id)?"checked":""} onchange="window._tgl('${side}','${p.player_id}')"/>
            <span class="pos ${posClass(p.position||"")}" style="font-size:9px;min-width:22px">${p.position||"?"}</span>
            <span style="flex:1;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.full_name||p.player_id)}</span>
            ${fcVal(p.player_id)?`<span style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace">${fcVal(p.player_id).toLocaleString()}</span>`:""}
          </label>`).join("")}
      </div>
      <div class="ttotal">Total: ${(side==="A"?vA:vB).toLocaleString()}</div>
    </div>`).join("")}
  </div>
  ${(S.tradeA.length||S.tradeB.length)?`
  <div class="verdict">
    <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px">Trade Verdict · FantasyCalc SF</div>
    <div style="font-size:17px;font-weight:600;margin-bottom:3px;color:${diff>500?"var(--green)":diff<-500?"var(--red)":"var(--amber)"}">
      ${diff>500?"You win this trade ✓":diff<-500?"You give up value ✗":"Roughly even ≈"}
    </div>
    ${Math.abs(diff)>0?`<div style="font-size:12px;color:var(--text2);font-family:'DM Mono',monospace;margin-bottom:10px">Δ ${Math.abs(diff).toLocaleString()} ${diff>0?"in your favor":"against you"}</div>`:""}
    ${renderTradeBreakdown()}
    <button class="btn btn-primary" style="font-size:12px;margin-top:10px" onclick="copyTrade()">Copy analysis prompt</button>
  </div>`:`<div class="empty" style="padding:1.5rem 0">Select players on both sides to compare</div>`}`;
}

function renderTradeBreakdown(){
  if(!S.tradeA.length&&!S.tradeB.length) return "";
  const allPids=[...new Set([...S.tradeA,...S.tradeB])];
  return `<div style="text-align:left;margin-top:8px">
    ${[["You send",S.tradeA],["You receive",S.tradeB]].map(([label,pids])=>`
    <div style="margin-bottom:8px">
      <div style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">${label}</div>
      ${pids.map(pid=>{ const p=S.players[pid]||{}; const fc=S.fcMap[pid]; const ppr24=seasonPPR(pid,"2024"); const ppr23=seasonPPR(pid,"2023");
        return `<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--border)">
          <span class="pos ${posClass(p.position||"")}" style="font-size:9px;min-width:22px">${p.position||"?"}</span>
          <span style="flex:1;font-size:12px;font-weight:500">${esc(p.full_name||pid)}</span>
          ${ppr24!==null?`<span style="font-size:10px;color:var(--text2);font-family:'DM Mono',monospace">'24: ${ppr24.toFixed(0)}</span>`:""}
          ${fc?`<span style="font-size:10px;font-family:'DM Mono',monospace;color:var(--text3)">#${fc.rank}</span>`:""}
          ${valBadge(fcVal(pid))}
        </div>`; }).join("")}
    </div>`).join("")}
  </div>`;
}

window._tgl=(side,pid)=>{ if(side==="A") S.tradeA=S.tradeA.includes(pid)?S.tradeA.filter(p=>p!==pid):[...S.tradeA,pid]; else S.tradeB=S.tradeB.includes(pid)?S.tradeB.filter(p=>p!==pid):[...S.tradeB,pid]; render(); };

function copyTrade(){
  const fmt=pids=>pids.map(pid=>{ const fc=S.fcMap[pid]; const ppr24=seasonPPR(pid,"2024"); return `${playerName(pid)} (FC:${fc?.value||0}, #${fc?.rank||"?"}, 2024: ${ppr24!==null?ppr24.toFixed(0)+"pts":"no data"})`; }).join(", ");
  const vA=S.tradeA.reduce((s,pid)=>s+fcVal(pid),0), vB=S.tradeB.reduce((s,pid)=>s+fcVal(pid),0);
  const txt=`Dynasty trade (12-team SF PPR):\nI SEND [FC: ${vA.toLocaleString()}]: ${fmt(S.tradeA)||"nothing"}\nI RECEIVE [FC: ${vB.toLocaleString()}]: ${fmt(S.tradeB)||"nothing"}\nWho wins short vs long term? Should I do it, pass, or counter?`;
  if(navigator.clipboard) navigator.clipboard.writeText(txt).then(()=>showToast("Copied!"));
  else prompt("Copy:",txt);
}

// ═══════════════════════════════════════════════════════════
// SEARCH / PLAYER DETAIL
// ═══════════════════════════════════════════════════════════
function renderSearch(){
  const q=window._sq||"",pos=window._sp||"ALL",sel=window._ssel;
  if(sel) return renderPlayerDetail(sel);
  const results=q.length>1?Object.entries(S.players||{}).filter(([pid,p])=>{
    if(!p.full_name) return false;
    const mp=pos==="ALL"||(p.position||"").toUpperCase()===pos;
    return mp&&p.full_name.toLowerCase().includes(q.toLowerCase());
  }).slice(0,25):[];
  return `
  <input class="inp" placeholder="Search any NFL player…" value="${esc(q)}" oninput="window._sq=this.value;render()" style="margin-bottom:10px"/>
  <div class="filters">${["ALL","QB","RB","WR","TE"].map(p=>`<button class="btn btn-sm ${pos===p?"on":""}" onclick="window._sp='${p}';render()">${p}</button>`).join("")}</div>
  ${!Object.keys(S.players||{}).length?`<div class="empty">Player data loading…</div>`:""}
  ${results.map(([pid,p])=>{ const fc=S.fcMap[pid]; const val=fc?.value||0; const ppr24=seasonPPR(pid,"2024");
    return `<div class="card" style="padding:9px 12px;cursor:pointer;margin-bottom:6px" onclick="window._ssel='${pid}';render()">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="pos ${posClass(p.position||"")}" style="min-width:26px;text-align:center">${p.position||"?"}</span>
        <span style="flex:1;font-weight:500;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.full_name)}</span>
        <span style="font-size:11px;color:var(--text2)">${p.team||"FA"}</span>
        ${ppr24!==null?`<span style="font-size:11px;color:var(--teal);font-family:'DM Mono',monospace">${ppr24.toFixed(0)}pts</span>`:""}
        ${val?valBadge(val):""}
      </div>
    </div>`; }).join("")}
  ${q.length>1&&!results.length?`<div class="empty">No players found</div>`:""}
  ${!q?`<div class="empty">Type a player name to search</div>`:""}`;
}

function renderPlayerDetail(pid){
  const p=S.players[pid]||{};
  const fc=S.fcMap[pid];
  const age=p.age||(p.birth_date?Math.floor((Date.now()-new Date(p.birth_date))/31557600000):null);
  const ownerR=S.rosters.find(r=>(r.players||[]).includes(pid));
  const news=S.newsCache[pid];
  const scout=S.fcLoaded?buildScoutReport(pid):null;
  const ppr22=seasonPPR(pid,"2022"), ppr23=seasonPPR(pid,"2023"), ppr24=seasonPPR(pid,"2024");
  const rawStats=S.histStats[pid];

  if(news===undefined&&!window[`_nl_${pid}`]){ window[`_nl_${pid}`]=true; fetchPlayerNews(pid).then(()=>render()); }

  // Key stats for display
  const s24=rawStats?.["2024"]||{}, s23=rawStats?.["2023"]||{}, s22=rawStats?.["2022"]||{};
  const pos=(p.position||"").toUpperCase();
  const statKeys=pos==="QB"?[["pass_yd","Pass Yd"],["pass_td","TD"],["pass_int","INT"],["rush_yd","Rush Yd"]]:
                 pos==="RB"?[["rush_yd","Rush Yd"],["rush_td","Rush TD"],["rec","Rec"],["rec_yd","Rec Yd"]]:
                            [["rec","Rec"],["rec_yd","Rec Yd"],["rec_td","TD"],["rush_yd","Rush Yd"]];

  function statRow(s,yr){
    if(!s||!Object.keys(s).length) return "";
    const cells=statKeys.filter(([k])=>parseFloat(s[k]||0)>0).map(([k,l])=>`<div class="stat-cell"><div class="stat-label">${l}</div><div class="stat-val" style="font-size:13px">${parseFloat(s[k]).toFixed(k.includes("td")||k==="rec"?0:0)}</div></div>`).join("");
    if(!cells) return "";
    return `<div style="margin-bottom:6px"><div style="font-size:10px;font-weight:600;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">${yr} Season</div><div class="stat-grid">${cells}<div class="stat-cell"><div class="stat-label">Fant Pts</div><div class="stat-val" style="font-size:13px;color:var(--green)">${calcPPR(s).toFixed(0)}</div></div></div></div>`;
  }="font-size:18px;color:var(--green)">${ppr24.toFixed(0)}</div></div>`:""}
      ${ppr23!==null?`<div class="metric"><div class="mlabel">2023 Fant Pts</div><div class="mval" style="font-size:16px">${ppr23.toFixed(0)}</div></div>`:""}
      ${ppr22!==null?`<div class="metric"><div class="mlabel">2022 Fant Pts</div><div class="mval" style="font-size:16px">${ppr22.toFixed(0)}</div></div>`:""}
    </div>
    ${statRow(s24,"2024")}${statRow(s23,"2023")}${statRow(s22,"2022")}
  </div>

  ${scout?`
  <div class="card">
    <div class="ctitle">Dynasty Scouting Report</div>
    <span class="verdict-tag ${scout.verdictClass}">${scout.verdict}</span>
    <div class="scout-section"><div class="scout-title" style="color:var(--accent)">Production & Value</div><div class="scout-text">${scout.s1}</div></div>
    <div class="scout-section"><div class="scout-title" style="color:var(--amber)">Age Curve</div><div class="scout-text">${scout.s2}</div></div>
    <div class="scout-section"><div class="scout-title" style="color:var(--green)">Dynasty Verdict</div><div class="scout-text">${scout.s3}</div></div>
  </div>`:`<div class="card"><div class="ctitle">Dynasty Scouting Report</div><div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text3)"><div class="spin spin-sm"></div>Loading FantasyCalc values…</div></div>`}

  <div class="card">
    <div class="ctitle">Latest News · ESPN</div>
    ${news===undefined||news===null?`<div style="display:flex;align-items:center;gap:8px;color:var(--text3);font-size:12px;padding:4px 0"><div class="spin spin-sm"></div>Loading…</div>`:
    news.length?news.map(a=>`<div class="news-item"><div class="news-headline">${esc(a.headline)}</div>${a.desc?`<div class="news-desc">${esc(a.desc.slice(0,160))}${a.desc.length>160?"…":""}</div>`:""}<div class="news-meta">${a.date}</div></div>`).join(""):
    `<div style="font-size:12px;color:var(--text3);padding:4px 0">No recent ESPN news found</div>`}
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// PLAYER ROW
// ═══════════════════════════════════════════════════════════
function prow(p,opts={}){
  const {showVal=false,showRank=false,showProd=false,prodYear="2024",showTrend=false,clickable=false}=opts;
  const pos=p.position||p.fantasy_positions?.[0]||"";
  const val=fcVal(p.player_id);
  const fc=S.fcMap[p.player_id];
  const age=p.age||(p.birth_date?Math.floor((Date.now()-new Date(p.birth_date))/31557600000):null);
  const prod=showProd?seasonPPR(p.player_id,prodYear):null;
  return `<div class="prow"${clickable?` style="cursor:pointer" onclick="window._ssel='${p.player_id}';go('search')"`:""}">
    <span class="pos ${posClass(pos)}" style="min-width:26px;text-align:center">${pos||"?"}</span>
    <span class="pname">${esc(p.full_name||p.player_id)}</span>
    ${age?`<span class="pmeta">${age}y</span>`:""}
    ${p.team?`<span class="pteam">${p.team}</span>`:""}
    ${prod!==null?`<span style="font-size:11px;color:var(--teal);font-family:'DM Mono',monospace;min-width:38px;text-align:right">${prod.toFixed(0)}pts</span>`:""}
    ${showTrend&&fc?trendBadge(fc.trend30):""}
    ${showRank&&fc?rankBadge(fc.rank):""}
    ${showVal?valBadge(val):""}
  </div>`;
}

boot();
</script>
</body>
</html>
