<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0E0F13"/>
<title>Dynasty HQ</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f12;--bg2:#151820;--bg3:#1c2029;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --text:#f0f2f5;--text2:#8891a4;--text3:#555e6e;
  --accent:#3ecf8e;--blue:#4f8ef7;--amber:#f6a623;--red:#f25c54;--purple:#a78bfa;--teal:#2dd4bf;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
html,body,#root{height:100%;overflow:hidden}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-text-size-adjust:100%}
.shell{display:flex;flex-direction:column;height:100dvh;overflow:hidden}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:calc(var(--safe-top) + 10px) 14px 10px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:100}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:12px 13px calc(var(--safe-bot) + 76px)}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding:7px 0 calc(var(--safe-bot) + 3px);display:flex;justify-content:space-around;z-index:100}
.nb{display:flex;flex-direction:column;align-items:center;gap:2px;padding:3px 6px;border:none;background:none;color:var(--text3);font-family:inherit;font-size:10px;font-weight:500;cursor:pointer;min-width:52px;-webkit-tap-highlight-color:transparent}
.nb svg{width:20px;height:20px;stroke-width:1.75}
.nb.on{color:var(--accent)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:13px;margin-bottom:10px}
.ctitle{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:11px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:10px}
.metric{background:var(--bg3);border-radius:10px;padding:10px 12px}
.ml{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.mv{font-size:20px;font-weight:600;letter-spacing:-.02em;line-height:1.1}
.ms{font-size:11px;color:var(--text2);margin-top:1px}
.prow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.prow:last-child{border-bottom:none}
.pname{flex:1;font-size:13px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.inp{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-family:inherit;font-size:14px;outline:none;-webkit-appearance:none}
.inp:focus{border-color:var(--accent)}
.inp::placeholder{color:var(--text3)}
.sel{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:8px;font-family:inherit;font-size:12px;outline:none;-webkit-appearance:none;cursor:pointer;max-width:140px}
.sel:focus{border-color:var(--accent)}
select option{background:#1c2029}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text);-webkit-tap-highlight-color:transparent}
.btn.on{background:rgba(62,207,142,.14);border-color:rgba(62,207,142,.4);color:var(--accent)}
.btn.on-blue{background:rgba(79,142,247,.14);border-color:rgba(79,142,247,.4);color:var(--blue)}
.btn-accent{background:var(--accent);border-color:var(--accent);color:#0d0f12;font-weight:600}
.btn-blue{background:var(--blue);border-color:var(--blue);color:#fff}
.pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.seg{display:flex;background:var(--bg3);border-radius:10px;padding:3px;margin-bottom:14px;gap:2px}
.seg-btn{flex:1;padding:8px 0;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;transition:all .15s;background:transparent;color:var(--text2)}
.seg-btn.on{background:var(--accent);color:#0d0f12}
.srow{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:7px;margin-bottom:2px}
.srow.me{background:rgba(79,142,247,.08);border:1px solid rgba(79,142,247,.2)}
.spin{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.fade{animation:fd .2s ease}
@keyframes fd{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.analysis-box{background:linear-gradient(135deg,rgba(62,207,142,.07),rgba(79,142,247,.05));border:1px solid rgba(62,207,142,.18);border-radius:14px;padding:14px;margin-bottom:10px}
.tchk{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);cursor:pointer}
.tchk:last-child{border-bottom:none}
.tchk input{accent-color:var(--accent);width:14px;height:14px;flex-shrink:0}
.prog-wrap{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.prog-bar{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .4s}
.scout-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.news-item{padding:9px 0;border-bottom:1px solid var(--border)}
.news-item:last-child{border-bottom:none}
.pkbadge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;background:rgba(167,139,250,.12);color:var(--purple);font-family:'DM Mono',monospace}
.trade-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.rank-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;margin-bottom:2px}
.rank-row.me{background:rgba(62,207,142,.06);border:1px solid rgba(62,207,142,.2)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script>
'use strict';
// ─── SHORTHAND ────────────────────────────────────────────────────────────────
const {createElement:h,useState,useEffect,useCallback,useMemo,useRef,createContext,useContext,Fragment} = React;

// ─── CONFIG ───────────────────────────────────────────────────────────────────
const LEAGUE_ID = "1313311335559200768";
const SLP  = "https://api.sleeper.app/v1";
const SLP2 = "https://api.sleeper.com";
const FC_URL = "https://api.fantasycalc.com/values/current?isDynasty=true&numQbs=2&numTeams=12&ppr=1";
const ESPN  = "https://site.api.espn.com/apis/site/v2/sports/football/nfl/news";
const PCACHE_KEY = "dhq_players_v3";
const LCACHE_KEY = "dhq_league_v3";
const PCACHE_TTL = 24*3600000;
const LCACHE_TTL = 5*60000;

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function cacheGet(k,ttl){try{const r=JSON.parse(localStorage.getItem(k)||"null");return r&&(Date.now()-r.ts<ttl)?r.data:null;}catch{return null;}}
function cacheSet(k,d){try{localStorage.setItem(k,JSON.stringify({ts:Date.now(),data:d}));}catch{}}
function cacheClear(k){try{localStorage.removeItem(k);}catch{}}
async function jfetch(url,ms=12000){
  const c=new AbortController();
  const t=setTimeout(()=>c.abort(),ms);
  try{const r=await fetch(url,{signal:c.signal});clearTimeout(t);if(!r.ok)throw new Error(r.status);return await r.json();}
  catch(e){clearTimeout(t);throw e;}
}
function calcPPR(s){
  if(!s)return 0;if(s.pts_ppr)return parseFloat(s.pts_ppr);
  let p=0;p+=(s.pass_yd||0)*.04;p+=(s.pass_td||0)*4;p-=(s.pass_int||0)*2;
  p+=(s.rush_yd||0)*.1;p+=(s.rush_td||0)*6;p+=(s.rec||0)*1;p+=(s.rec_yd||0)*.1;p+=(s.rec_td||0)*6;p-=(s.fum_lost||0)*2;
  return parseFloat(p.toFixed(1));
}
function ownerName(r,users){if(!r)return"?";const u=users[r.owner_id];return u?.metadata?.team_name||u?.display_name||u?.username||`Team ${r.roster_id}`;}
function optimalLineup(players,fcMap){
  const byPos={QB:[],RB:[],WR:[],TE:[]};
  players.forEach(p=>{const pos=(p.position||"").toUpperCase();if(byPos[pos])byPos[pos].push({pid:p.player_id,val:fcMap[p.player_id]?.value||0});});
  Object.values(byPos).forEach(a=>a.sort((a,b)=>b.val-a.val));
  const qbs=byPos.QB.slice(0,2),rbs=byPos.RB.slice(0,2),wrs=byPos.WR.slice(0,3),tes=byPos.TE.slice(0,1);
  const used=new Set([...qbs,...rbs,...wrs,...tes].map(p=>p.pid));
  const flex=[...byPos.RB.slice(2),...byPos.WR.slice(3),...byPos.TE.slice(1)].filter(p=>!used.has(p.pid)).sort((a,b)=>b.val-a.val).slice(0,1);
  return[...qbs,...rbs,...wrs,...tes,...flex].reduce((s,p)=>s+p.val,0);
}
function getLatestPPR(pid,histStats){
  const h=histStats[pid];if(!h)return null;
  const seasons=Object.keys(h).sort((a,b)=>b-a);
  for(const s of seasons){const v=calcPPR(h[s]);if(v>0)return{pts:v,season:s};}
  return null;
}
function posClass(p){const u=(p||"").toUpperCase();return["QB","RB","WR","TE"].includes(u)?u:"K";}
function valBadge(val){
  if(!val||val<1)return h("span",{style:{fontSize:11,color:"var(--text3)"}},"\u2014");
  const c=val>8000?"rgba(167,139,250,.15),#a78bfa":val>6000?"rgba(79,142,247,.15),#4f8ef7":val>3500?"rgba(62,207,142,.15),#3ecf8e":val>1500?"rgba(246,166,35,.15),#f6a623":"rgba(242,92,84,.15),#f25c54";
  const[bg,color]=c.split(",");
  return h("span",{style:{fontSize:11,fontWeight:600,fontFamily:"'DM Mono',monospace",padding:"2px 6px",borderRadius:4,background:bg,color,flexShrink:0,whiteSpace:"nowrap"}},val.toLocaleString());
}
function rankBadge(rank){
  if(!rank||rank>500)return null;
  const c=rank<=10?"rgba(167,139,250,.15),#a78bfa":rank<=30?"rgba(79,142,247,.15),#4f8ef7":rank<=80?"rgba(62,207,142,.15),#3ecf8e":rank<=150?"rgba(246,166,35,.15),#f6a623":"rgba(136,145,164,.12),#8891a4";
  const[bg,color]=c.split(",");
  return h("span",{style:{fontSize:11,fontWeight:600,fontFamily:"'DM Mono',monospace",padding:"2px 6px",borderRadius:4,background:bg,color,flexShrink:0}},"#"+rank);
}
function trendBadge(t){
  if(!t||Math.abs(t)<5)return null;
  return h("span",{style:{fontSize:11,fontFamily:"'DM Mono',monospace",color:t>0?"var(--accent)":"var(--red)",flexShrink:0}},t>0?`\u25b2${t}`:`\u25bc${Math.abs(t)}`);
}
function posBadge(pos){
  const p=posClass(pos);
  const colors={QB:"rgba(242,92,84,.15),#f25c54",RB:"rgba(62,207,142,.15),#3ecf8e",WR:"rgba(79,142,247,.15),#4f8ef7",TE:"rgba(246,166,35,.15),#f6a623",K:"rgba(136,145,164,.13),#8891a4"};
  const[bg,color]=(colors[p]||colors.K).split(",");
  return h("span",{style:{fontSize:10,fontWeight:700,fontFamily:"'DM Mono',monospace",padding:"2px 5px",borderRadius:4,minWidth:28,textAlign:"center",background:bg,color,flexShrink:0}},p);
}
function gradeOf(avg){
  if(avg>8000)return{g:"A+",bg:"rgba(167,139,250,.15)",color:"#a78bfa"};
  if(avg>6000)return{g:"A",bg:"rgba(79,142,247,.15)",color:"#4f8ef7"};
  if(avg>3500)return{g:"B",bg:"rgba(62,207,142,.15)",color:"#3ecf8e"};
  if(avg>1500)return{g:"C",bg:"rgba(246,166,35,.15)",color:"#f6a623"};
  return{g:"D",bg:"rgba(242,92,84,.15)",color:"#f25c54"};
}
function Spinner({size=24}){return h("div",{className:"spin",style:{width:size,height:size,borderWidth:size>20?3:2}});}
function Empty({children}){return h("div",{style:{textAlign:"center",padding:"2rem 0",color:"var(--text3)",fontSize:13}},children);}

// ─── PLAYER ROW ───────────────────────────────────────────────────────────────
function PlayerRow({player,fcMap,onClick,showVal=true,showRank=false,showTrend=true,showPts,compact=false}){
  const fc=fcMap?.[player.player_id];
  const age=player.age||(player.birth_date?Math.floor((Date.now()-new Date(player.birth_date))/31557600000):null);
  const pos=player.position||player.fantasy_positions?.[0]||"";
  return h("div",{
    className:"prow",
    style:{cursor:onClick?"pointer":undefined,padding:compact?"5px 0":"7px 0"},
    onClick,
  },
    posBadge(pos),
    h("span",{className:"pname"},player.full_name||player.player_id||"Unknown"),
    age&&h("span",{style:{fontSize:11,color:"var(--text3)",flexShrink:0}},age+"y"),
    player.team&&h("span",{style:{fontSize:11,color:"var(--text2)",flexShrink:0,minWidth:26}},player.team),
    showPts>0&&h("span",{style:{fontSize:11,color:"var(--teal)",fontFamily:"'DM Mono',monospace",minWidth:36,textAlign:"right",flexShrink:0}},showPts.toFixed(0)),
    showTrend&&fc&&trendBadge(fc.trend30),
    showRank&&fc&&rankBadge(fc.rank),
    showVal&&valBadge(fc?.value),
  );
}

// ─── DATA CONTEXT ─────────────────────────────────────────────────────────────
const Ctx = createContext(null);
function useApp(){return useContext(Ctx);}

function DataProvider({children}){
  const [league,setLeague]=useState(null);
  const [rosters,setRosters]=useState([]);
  const [users,setUsers]=useState({});
  const [players,setPlayers]=useState({});
  const [fcMap,setFcMap]=useState({});
  const [histStats,setHistStats]=useState({});
  const [transactions,setTxns]=useState([]);
  const [tradedPicks,setTradedPicks]=useState([]);
  const [myRosterId,setMyRosterId]=useState(null);
  const [newsCache,setNewsCache]=useState({});
  const [lineupRanks,setLineupRanks]=useState([]);
  const [fcLoaded,setFcLoaded]=useState(false);
  const [playersLoaded,setPlayersLoaded]=useState(false);
  const [statsLoaded,setStatsLoaded]=useState(false);
  const [txnLoaded,setTxnLoaded]=useState(false);
  const [leagueLoaded,setLeagueLoaded]=useState(false);
  const [playerCount,setPlayerCount]=useState(0);
  const histRef=useRef(false);

  // Compute lineup ranks
  useEffect(()=>{
    if(!fcLoaded||!rosters.length)return;
    const ranked=rosters.map(r=>{
      const pl=(r.players||[]).map(pid=>({player_id:pid,...players[pid]}));
      return{roster_id:r.roster_id,wins:r.settings?.wins||0,losses:r.settings?.losses||0,
        lineupVal:optimalLineup(pl,fcMap),
        totalVal:pl.reduce((s,p)=>s+(fcMap[p.player_id]?.value||0),0)};
    }).sort((a,b)=>b.lineupVal-a.lineupVal);
    setLineupRanks(ranked);
  },[fcMap,rosters,players,fcLoaded]);

  // Load league
  useEffect(()=>{
    const cached=cacheGet(LCACHE_KEY,LCACHE_TTL);
    if(cached){
      setLeague(cached.league);setRosters(cached.rosters);
      const um={};cached.users.forEach(u=>{um[u.user_id]=u;});setUsers(um);
      setMyRosterId(cached.rosters[0]?.roster_id);setLeagueLoaded(true);
    }
    Promise.all([
      jfetch(`${SLP}/league/${LEAGUE_ID}`,8000),
      jfetch(`${SLP}/league/${LEAGUE_ID}/rosters`,8000),
      jfetch(`${SLP}/league/${LEAGUE_ID}/users`,8000),
    ]).then(([lg,rs,uArr])=>{
      setLeague(lg);setRosters(rs);
      const um={};uArr.forEach(u=>{um[u.user_id]=u;});setUsers(um);
      if(!cached)setMyRosterId(rs[0]?.roster_id);
      cacheSet(LCACHE_KEY,{league:lg,rosters:rs,users:uArr});
      setLeagueLoaded(true);
    }).catch(e=>console.warn("League failed",e));
  },[]);

  // Load players
  useEffect(()=>{
    const cached=cacheGet(PCACHE_KEY,PCACHE_TTL);
    if(cached&&Object.keys(cached).length>100){
      setPlayers(cached);setPlayersLoaded(true);setPlayerCount(Object.keys(cached).length);
      const age=(()=>{try{return JSON.parse(localStorage.getItem(PCACHE_KEY)||"{}").ts||0;}catch{return 0;}})();
      if(Date.now()-age>12*3600000)fetchPlayers(false);
      return;
    }
    fetchPlayers(true);
  },[]);

  async function fetchPlayers(setAfter){
    try{
      const data=await jfetch(`${SLP}/players/nfl`,30000);
      const slim={};
      Object.entries(data).forEach(([pid,p])=>{
        if(!p.full_name)return;
        slim[pid]={player_id:pid,full_name:p.full_name,position:p.position,fantasy_positions:p.fantasy_positions,
          team:p.team,age:p.age,birth_date:p.birth_date,years_exp:p.years_exp,
          height:p.height,weight:p.weight,college:p.college,espn_id:p.espn_id,stats_id:p.stats_id};
      });
      cacheSet(PCACHE_KEY,slim);
      if(setAfter){setPlayers(slim);setPlayersLoaded(true);setPlayerCount(Object.keys(slim).length);}
      else setPlayers(slim);
    }catch(e){
      console.warn("Full players failed, trying individual:",e.message);
      // Fallback: fetch only rostered players
      const pids=[...new Set(rosters.flatMap(r=>r.players||[]))];
      const result={};
      for(let i=0;i<pids.length;i+=8){
        await Promise.all(pids.slice(i,i+8).map(async pid=>{
          try{const p=await jfetch(`${SLP}/players/nfl/${pid}`,5000);if(p?.full_name)result[pid]=p;}catch{}
        }));
      }
      setPlayers(result);setPlayersLoaded(true);setPlayerCount(Object.keys(result).length);
    }
  }

  // Load FC values
  useEffect(()=>{
    jfetch(FC_URL,10000).then(data=>{
      const map={};
      data.forEach(item=>{
        const pid=item.player?.sleeperId;
        if(pid)map[pid]={value:item.value||0,rank:item.overallRank||9999,posRank:item.positionRank||9999,trend30:item.trend30Day||0};
      });
      setFcMap(map);setFcLoaded(true);
    }).catch(e=>console.warn("FC failed",e));
  },[]);

  // Load transactions + traded picks
  useEffect(()=>{
    jfetch(`${SLP}/state/nfl`,10000).then(nfl=>{
      const weeks=Math.min(nfl.leg||1,18);
      const all=[];
      const fetches=[];
      for(let w=1;w<=weeks;w+=4){
        const batch=[];
        for(let b=w;b<Math.min(w+4,weeks+1);b++)batch.push(jfetch(`${SLP}/league/${LEAGUE_ID}/transactions/${b}`,8000).catch(()=>[]));
        fetches.push(Promise.all(batch).then(res=>res.forEach(arr=>{if(Array.isArray(arr))all.push(...arr);})));
      }
      Promise.all(fetches).then(()=>{
        setTxns(all.filter(t=>t.status==="complete").sort((a,b)=>(b.status_updated||0)-(a.status_updated||0)));
        setTxnLoaded(true);
      });
    }).catch(()=>{});
    jfetch(`${SLP}/league/${LEAGUE_ID}/traded_picks`,8000).then(d=>setTradedPicks(d)).catch(()=>{});
  },[]);

  // Load historical stats once players + rosters are ready
  useEffect(()=>{
    if(!leagueLoaded||!playersLoaded||!rosters.length||histRef.current)return;
    histRef.current=true;
    const allPids=[...new Set(rosters.flatMap(r=>r.players||[]))];
    const seasons=["2019","2020","2021","2022","2023","2024","2025"];
    const newStats={};
    (async()=>{
      for(let i=0;i<allPids.length;i+=5){
        const chunk=allPids.slice(i,i+5);
        await Promise.all(chunk.map(async pid=>{
          try{
            const results=await Promise.all(seasons.map(season=>
              fetch(`${SLP2}/stats/nfl/player/${pid}?season_type=regular&season=${season}&grouping=season`)
                .then(r=>r.ok?r.json():null).catch(()=>null)
            ));
            const career={};
            seasons.forEach((s,idx)=>{const d=results[idx];if(d?.stats&&Object.keys(d.stats).length>0)career[s]=d.stats;});
            if(Object.keys(career).length>0)newStats[pid]=career;
          }catch{}
        }));
        if(i===0){setHistStats({...newStats});setStatsLoaded(true);}
      }
      setHistStats({...newStats});setStatsLoaded(true);
    })();
  },[leagueLoaded,playersLoaded,rosters.length]);

  const fetchNews=useCallback(async(pid)=>{
    if(newsCache[pid]!==undefined)return newsCache[pid];
    const p=players[pid]||{};
    const espnId=p.espn_id||p.stats_id;
    if(!espnId){setNewsCache(prev=>({...prev,[pid]:[]}));return[];}
    try{
      const d=await jfetch(`${ESPN}?athlete=${espnId}&limit=5`,8000);

      setNewsCache(prev=>({...prev,[pid]:articles}));return articles;

  },[players,newsCache]);

  },[]);

// ─── TEAM ANALYSIS ────────────────────────────────────────────────────────────
function buildAnalysis(players,fcMap,lineupRanks,rosterId){
  if(!players.length||!Object.keys(fcMap).length)return null;
  const byPos={QB:[],RB:[],WR:[],TE:[]};
  players.forEach(p=>{const pos=(p.position||"").toUpperCase();if(byPos[pos])byPos[pos].push(p);});
  Object.values(byPos).forEach(a=>a.sort((x,y)=>(fcMap[y.player_id]?.value||0)-(fcMap[x.player_id]?.value||0)));
  const top10=[...players].sort((a,b)=>(fcMap[b.player_id]?.value||0)-(fcMap[a.player_id]?.value||0)).slice(0,10);
  const ages=top10.map(p=>p.age||(p.birth_date?Math.floor((Date.now()-new Date(p.birth_date))/31557600000):null)).filter(Boolean);
  const avgAge=ages.length?(ages.reduce((a,b)=>a+b,0)/ages.length).toFixed(1):"?";
  const lineupVal=optimalLineup(players,fcMap);
  const lrank=(lineupRanks.findIndex(r=>r.roster_id===rosterId)+1)||"?";
  const qbVal=(byPos.QB[0]?fcMap[byPos.QB[0].player_id]?.value||0:0)+(byPos.QB[1]?fcMap[byPos.QB[1].player_id]?.value||0:0);
  const wrVal=byPos.WR.slice(0,3).reduce((s,p)=>s+(fcMap[p.player_id]?.value||0),0);
  const rbVal=byPos.RB.slice(0,2).reduce((s,p)=>s+(fcMap[p.player_id]?.value||0),0);
  const netTrend=top10.reduce((s,p)=>s+(fcMap[p.player_id]?.trend30||0),0);
  const aa=parseFloat(avgAge);const lv=lineupVal;
  let mode,modeColor;
  if(aa<24.5&&lv<32000){mode="Full Rebuild";modeColor="var(--red)";}
  else if(aa<25.5&&lv<45000){mode="Rebuilding";modeColor="var(--amber)";}
  else if(aa>=27.5&&lv>55000){mode="Win Now";modeColor="var(--purple)";}
  else if(aa>=26&&lv>45000){mode="Contender";modeColor="var(--blue)";}
  else{mode="Transitional";modeColor="var(--teal)";}
  const qbStr=[byPos.QB[0],byPos.QB[1]].filter(Boolean).map(p=>p.full_name?.split(" ").pop()||"").join(" & ");
  const wrStr=byPos.WR.slice(0,2).map(p=>p.full_name?.split(" ").pop()||"").join(" / ");
  const rbStr=byPos.RB.slice(0,2).map(p=>p.full_name?.split(" ").pop()||"").join(" / ");
  const p1=mode==="Contender"?`Legitimate contender. Core age ${avgAge}, lineup ranks #${lrank} in the league (${lineupVal.toLocaleString()}). Competitive window now with some long-term upside.`
    :mode==="Win Now"?`Win-now team. Core averages ${avgAge} years old. Lineup ranks #${lrank} (${lineupVal.toLocaleString()}). Every move should optimize for a championship in 1–2 seasons.`
    :mode.includes("Rebuild")?`${mode} roster. Core age ${avgAge}, lineup ranks #${lrank} (${lineupVal.toLocaleString()}). Prioritize young talent and future draft capital.`
    :`Transitional roster. Core age ${avgAge}, lineup ranks #${lrank} (${lineupVal.toLocaleString()}). A key trade could tip things either direction.`;
  const p2parts=[];
  if(qbStr)p2parts.push(`QB room (${qbStr}, combined SF: ${qbVal.toLocaleString()}) is your ${qbVal>14000?"biggest strength":"biggest need in superflex"}.`);
  if(wrVal>18000)p2parts.push(`WR corps is elite led by ${wrStr}.`);else if(wrVal<10000)p2parts.push(`WR is thin — clear area to upgrade.`);
  if(rbVal>12000)p2parts.push(`RB depth is strong with ${rbStr}.`);else if(rbVal<6000)p2parts.push(`RB corps is a weakness.`);
  const p2=p2parts.join(" ")||"Positional breakdown looks balanced.";
  let p3=netTrend>500?`Assets trending up (+${netTrend} 30-day). `:netTrend<-500?`Top assets lost value recently (${netTrend} combined 30-day) — worth monitoring. `:"";
  if(mode==="Win Now"||mode==="Contender")p3+=qbVal<10000?"Priority: upgrade QB room — elite QBs are worth overpaying in superflex.":wrVal<14000?"Priority: add a WR1-caliber weapon.":"You're well-built. Add depth or trade future picks for proven contributors.";
  else p3+="Focus on acquiring 2026–2027 picks and targeting players 22–24 on the age curve.";
  const strengths=[],concerns=[];
  if(qbVal>14000)strengths.push("Elite QB room");else if(qbVal<6000)concerns.push("Weak QB room");
  if(wrVal>18000)strengths.push("Deep WR corps");else if(wrVal<9000)concerns.push("Thin at WR");
  if(rbVal>12000)strengths.push("Strong RB depth");else if(rbVal<5000)concerns.push("RB weakness");
  if(netTrend>400)strengths.push("Assets trending ▲");if(netTrend<-400)concerns.push("Assets trending ▼");
  if(lrank!=="?"&&lrank<=3)strengths.push(`Top-${lrank} lineup power`);
  if(lrank!=="?"&&lrank>=10)concerns.push("Bottom-3 lineup power");
  return{mode,modeColor,p1,p2,p3,strengths,concerns,avgAge,lineupVal,lrank,netTrend};
}

// ─── SCOUT REPORT ─────────────────────────────────────────────────────────────
function buildScout(pid,players,fcMap,histStats){
  const p=players[pid];if(!p)return null;
  const fc=fcMap[pid];
  const pos=(p.position||"").toUpperCase();
  const age=p.age||(p.birth_date?Math.floor((Date.now()-new Date(p.birth_date))/31557600000):null)||0;
  const val=fc?.value||0;const rank=fc?.rank||9999;const trend=fc?.trend30||0;
  const careerH=histStats[pid]||{};
  const sortedSeasons=Object.keys(careerH).sort((a,b)=>b-a);
  const latestPPR=sortedSeasons[0]?calcPPR(careerH[sortedSeasons[0]]):null;
  const prevPPR=sortedSeasons[1]?calcPPR(careerH[sortedSeasons[1]]):null;
  let prodTrend="stable";
  if(latestPPR!==null&&prevPPR!==null){if(latestPPR-prevPPR>30)prodTrend="rising";else if(latestPPR-prevPPR<-30)prodTrend="declining";}
  const curves={QB:[27,34],RB:[23,26],WR:[24,29],TE:[26,30]};
  const curve=curves[pos]||curves.WR;
  const inPeak=age>=curve[0]&&age<=curve[1];
  const prePeak=age<curve[0];const postPeak=age>curve[1];
  let verdict,vc;
  if(prePeak&&val>2000&&trend>=0){verdict="BUY";vc="#3ecf8e";}
  else if(postPeak&&prodTrend==="declining"&&age>30){verdict="SELL";vc="#f25c54";}
  else if(prodTrend==="rising"&&val>2000){verdict="BUY";vc="#3ecf8e";}
  else if(trend<-200&&postPeak){verdict="SELL";vc="#f25c54";}
  else{verdict="HOLD";vc="#f6a623";}
  let s1=val>6000?`Elite dynasty asset ranked #${rank} overall (SF: ${val.toLocaleString()}). `:val>3000?`Solid contributor ranked #${rank} (SF: ${val.toLocaleString()}). `:val>0?`Modest dynasty value at #${rank} (SF: ${val.toLocaleString()}). `:`Currently unranked on FantasyCalc. `;
  if(sortedSeasons.length){const pts=sortedSeasons.slice(0,3).map(yr=>`${yr}: ${calcPPR(careerH[yr]).toFixed(0)} pts`).join(", ");s1+=`PPR totals — ${pts}. `;s1+=prodTrend==="rising"?"Production trending upward.":prodTrend==="declining"?"Production has declined recently.":"Production relatively consistent.";}
  const fn=p.full_name?.split(" ")[0]||"";
  let s2=prePeak?`At ${age}, ${fn} is ${curve[0]-age>0?`${curve[0]-age}yr from their peak window (${curve[0]}–${curve[1]} for ${pos})`:"just entering their peak"}. Best years still ahead.`:inPeak?`At ${age}, right in their peak window (${curve[0]}–${curve[1]} for ${pos}). Prime dynasty value.`:`At ${age}, ${age-curve[1]}yr past the typical ${pos} peak. ${age>32?"Age-related decline is real.":"1–2 more productive seasons possible."}`;
  let s3=verdict==="BUY"?`BUY. ${prePeak?"Young age curve + strong value = ideal target.":"Rising production suggests market undervaluation."}`
    :verdict==="SELL"?"SELL. Age, declining production, and negative trends point to selling for younger talent or picks."
    :`HOLD. ${inPeak?"Peak window, stable value — not a sell unless getting elite return.":"No compelling reason to move either direction."}`;
  if(Math.abs(trend)>=50)s3+=` 30-day trend: ${trend>0?"+"+trend:trend} FC.`;
  return{verdict,vc,s1,s2,s3,inPeak,prePeak};
}

// ─── TRADE SUGGESTIONS ────────────────────────────────────────────────────────
function genSuggestions(myRoster,myPlayers,allRosters,allPlayers,fcMap,histStats,users){
  function classifyTeam(pls){
    if(!pls.length)return"Unknown";
    const top10=[...pls].sort((a,b)=>(fcMap[b.player_id]?.value||0)-(fcMap[a.player_id]?.value||0)).slice(0,10);
    const ages=top10.map(p=>p.age||(p.birth_date?Math.floor((Date.now()-new Date(p.birth_date))/31557600000):null)).filter(Boolean);
    const avgAge=ages.length?ages.reduce((a,b)=>a+b,0)/ages.length:0;
    const lv=optimalLineup(pls,fcMap);
    if(avgAge<25.5&&lv<45000)return"Rebuilding";
    if(avgAge>=27.5&&lv>55000)return"Win Now";
    if(avgAge>=26&&lv>45000)return"Contender";
    return"Transitional";
  }
  const myMode=classifyTeam(myPlayers);
  const suggs=[];
  allRosters.forEach(r=>{
    if(r.roster_id===myRoster.roster_id)return;
    const theirPl=(r.players||[]).map(pid=>({player_id:pid,...allPlayers[pid]})).filter(p=>p.full_name);
    if(!theirPl.length)return;
    const theirMode=classifyTeam(theirPl);
    const theirName=ownerName(r,users);
    const mySorted=[...myPlayers].sort((a,b)=>(fcMap[b.player_id]?.value||0)-(fcMap[a.player_id]?.value||0));
    const theirSorted=[...theirPl].sort((a,b)=>(fcMap[b.player_id]?.value||0)-(fcMap[a.player_id]?.value||0));
    for(let i=3;i<Math.min(mySorted.length,15);i++){
      const send=mySorted[i];const sv=fcMap[send.player_id]?.value||0;if(sv<500)continue;
      for(let j=0;j<Math.min(theirSorted.length,12);j++){
        const recv=theirSorted[j];const rv=fcMap[recv.player_id]?.value||0;if(rv<500)continue;
        if(send.player_id===recv.player_id)continue;
        if(Math.abs(rv-sv)>sv*0.5)continue;
        let fit=50;
        const sa=send.age||25,ra=recv.age||25;
        if((theirMode==="Rebuilding"||theirMode==="Transitional")&&sa>ra+2)fit+=20;
        if(ra<25)fit+=15;if(rv>sv)fit+=10;
        const lp1=getLatestPPR(recv.player_id,histStats)?.pts||0;
        const lp2=getLatestPPR(send.player_id,histStats)?.pts||0;
        const projDelta=Math.round(lp1-lp2);
        if(fit>=50){
          const n1=send.full_name?.split(" ").pop()||"";const n2=recv.full_name?.split(" ").pop()||"";
          const exp=`${theirMode} team ${theirMode==="Rebuilding"?"happy to acquire "+n1+" for upside":"wants proven contributors"}; ${rv>sv?"you upgrade value by "+(rv-sv).toLocaleString():sv>rv?"you trade down but gain "+(ra<sa?"age curve":"positional fit"):""}.${projDelta>50?" Projection favors you by "+projDelta+".":projDelta<-50?" They get better recent production.":""}`;
          suggs.push({id:`${r.roster_id}-${send.player_id}-${recv.player_id}`,theirRosterId:r.roster_id,theirName,theirMode,fitScore:fit,
            send:[{...send,value:sv}],receive:[{...recv,value:rv}],fcDelta:rv-sv,projDelta,explanation:exp.charAt(0).toUpperCase()+exp.slice(1)+"."});
        }
      }
    }
  });
  const teamCounts={};
  return suggs.sort((a,b)=>b.fitScore-a.fitScore).filter(s=>{teamCounts[s.theirRosterId]=(teamCounts[s.theirRosterId]||0)+1;return teamCounts[s.theirRosterId]<=2;}).slice(0,10);
}

function TradeBuilder(){
  const{rosters,players,fcMap,myRosterId,getRoster,getMyRoster,ownerName,histStats}=useApp();
  const[targetId,setTargetId]=useState("");
  const[sendPids,setSendPids]=useState([]);
  const[recvPids,setRecvPids]=useState([]);
  const[qA,setQA]=useState("");const[qB,setQB]=useState("");
  const myR=getMyRoster();
  const myPl=useMemo(()=>getRoster(myR),[myR,getRoster]);
  const theirR=rosters.find(r=>r.roster_id===parseInt(targetId));
  const theirPl=useMemo(()=>theirR?getRoster(theirR):[],[theirR,getRoster]);
  const toggle=(side,pid)=>{if(side==="A")setSendPids(p=>p.includes(pid)?p.filter(x=>x!==pid):[...p,pid]);else setRecvPids(p=>p.includes(pid)?p.filter(x=>x!==pid):[...p,pid]);};
  const vA=sendPids.reduce((s,pid)=>s+(fcMap[pid]?.value||0),0);
  const vB=recvPids.reduce((s,pid)=>s+(fcMap[pid]?.value||0),0);
  const diff=vA-vB;
  const filt=(pl,q)=>q?pl.filter(p=>(p.full_name||"").toLowerCase().includes(q.toLowerCase())):pl;
  const copyPrompt=()=>{
    const fmt=pids=>pids.map(pid=>{const fc=fcMap[pid];const lp=getLatestPPR(pid,histStats);return`${players[pid]?.full_name||pid} (FC:${fc?.value||0}, #${fc?.rank||"?"}, ${lp?.season||"pts"}:${lp?lp.pts.toFixed(0):"—"})`;}).join(", ");
    const txt=`Dynasty trade (12-team SF PPR):\nI SEND [FC: ${vA.toLocaleString()}]: ${fmt(sendPids)||"nothing"}\nI RECEIVE [FC: ${vB.toLocaleString()}]: ${fmt(recvPids)||"nothing"}\nWho wins short vs long term? Should I do it, pass, or counter?`;
    if(navigator.clipboard)navigator.clipboard.writeText(txt).then(()=>alert("Copied! Paste into Claude.ai"));else prompt("Copy:",txt);
  };

    h("div",{style:{fontSize:11,fontWeight:600,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".07em",marginBottom:8}},title),
    h("input",{className:"inp",style:{fontSize:12,padding:"6px 9px",marginBottom:8},placeholder:"Search\u2026",value:q,onChange:e=>setQ(e.target.value)}),
    h("div",{style:{maxHeight:200,overflowY:"auto"}},
      side==="B"&&!targetId?h("p",{style:{fontSize:11,color:"var(--text3)"}},"Select a team above"):
      filt(pl,q).map(p=>h("label",{key:p.player_id,className:"tchk"},
        h("input",{type:"checkbox",checked:sel.includes(p.player_id),onChange:()=>toggle(side,p.player_id)}),
        posBadge(p.position||""),
        h("span",{style:{flex:1,fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},p.full_name||p.player_id),
        fcMap[p.player_id]&&h("span",{style:{fontSize:10,color:"var(--text3)",fontFamily:"'DM Mono',monospace"}},(fcMap[p.player_id].value||0).toLocaleString()),
      ))
    ),
    h("div",{style:{marginTop:6,paddingTop:6,borderTop:"1px solid var(--border)",fontSize:11,fontWeight:600,fontFamily:"'DM Mono',monospace",color:"var(--text2)"}},`Total: ${(side==="A"?vA:vB).toLocaleString()}`),
  );
  return h(Fragment,null,
    h("div",{style:{marginBottom:12}},
      h("label",{style:{fontSize:10,color:"var(--text3)",display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:".06em"}},"Trading With"),
      h("select",{value:targetId,onChange:e=>{setTargetId(e.target.value);setRecvPids([]);},className:"sel",style:{maxWidth:"none",width:"100%"}},
        h("option",{value:""},"Select a team\u2026"),

      ),

    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}},
      h(Side,{title:"You Send",pl:myPl,sel:sendPids,side:"A",q:qA,setQ:setQA}),

      h("div",{style:{fontSize:10,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".06em",marginBottom:5}},"Trade Verdict \u00b7 FantasyCalc SF"),
      h("div",{style:{fontSize:17,fontWeight:600,marginBottom:4,color:diff>500?"var(--accent)":diff<-500?"var(--red)":"var(--amber)"}},diff>500?"You win this trade \u2713":diff<-500?"You give up value \u2717":"Roughly even \u2248"),

}

function PlayerDetail({pid,onBack,players,fcMap,histStats,rosters,ownerName,newsCache,fetchNews,fcLoaded}){
  const p=players[pid]||{};
  const fc=fcMap[pid];
  const age=p.age||(p.birth_date?Math.floor((Date.now()-new Date(p.birth_date))/31557600000):null);
  const ownerR=rosters.find(r=>(r.players||[]).includes(pid));
  const news=newsCache[pid];
  const scout=useMemo(()=>fcLoaded?buildScout(pid,players,fcMap,histStats):null,[pid,players,fcMap,histStats,fcLoaded]);
  const careerH=histStats[pid]||{};
  const sortedSeasons=Object.keys(careerH).sort((a,b)=>b-a);
  const pos=(p.position||"").toUpperCase();
  useEffect(()=>{if(news===undefined)fetchNews(pid);},[pid,news]);
  const statStr=s=>{
    if(!s)return"";
    if(pos==="QB"){const py=parseInt(s.pass_yd||0),ptd=parseInt(s.pass_td||0),int=parseInt(s.pass_int||0),ry=parseInt(s.rush_yd||0);return py>0?`${py.toLocaleString()} Yds \u00b7 ${ptd} TD \u00b7 ${int} INT${ry>0?" \u00b7 "+ry+" Rush":""}`:""}
    if(pos==="RB"){const ry=parseInt(s.rush_yd||0),rt=parseInt(s.rush_td||0),rec=parseInt(s.rec||0),recy=parseInt(s.rec_yd||0);return(ry>0||rec>0)?`${ry} Rush \u00b7 ${rt} TD \u00b7 ${rec} Rec \u00b7 ${recy} Rec Yd`:"";}
    const rec=parseInt(s.rec||0),recy=parseInt(s.rec_yd||0),tds=parseInt(s.rec_td||0),tgt=parseInt(s.tgt||0);
    return rec>0?`${tgt>0?tgt+" Tgt \u00b7 ":""}${rec} Rec \u00b7 ${recy} Yd \u00b7 ${tds} TD`:"";
  };
  const mostRecent=sortedSeasons[0];const prevSeason=sortedSeasons[1];
  const mostRecentPts=mostRecent?calcPPR(careerH[mostRecent]):null;
  const prevPts=prevSeason?calcPPR(careerH[prevSeason]):null;
  return h("div",{className:"fade"},
    h("button",{onClick:onBack,style:{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",borderRadius:8,border:"1px solid var(--border)",background:"var(--bg3)",color:"var(--text2)",fontFamily:"inherit",fontSize:12,cursor:"pointer",marginBottom:12}},"\u2190 Back"),
    h("div",{className:"card"},
      h("div",{style:{marginBottom:14}},
        h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:4}},posBadge(p.position||""),h("h2",{style:{fontSize:19,fontWeight:600,letterSpacing:"-.02em"}},p.full_name||pid)),
        h("div",{style:{fontSize:12,color:"var(--text2)"}},`${p.team||"FA"} \u00b7 Age ${age||"?"} \u00b7 ${p.years_exp!=null?p.years_exp+"yr exp":"Rookie"}`),
        ownerR?h("div",{style:{fontSize:11,color:"var(--text3)",marginTop:3}},"Owned by "+ownerName(ownerR)):h("div",{style:{fontSize:11,color:"var(--accent)",marginTop:3}},"\u2713 Free agent"),
      ),
      h("div",{className:"g2",style:{marginBottom:sortedSeasons.length?14:0}},
        fc?h(Fragment,null,
          h("div",{className:"metric"},h("div",{className:"ml"},"FC Value (SF)"),h("div",{className:"mv",style:{fontSize:18}},fc.value.toLocaleString())),
          h("div",{className:"metric"},h("div",{className:"ml"},"Overall Rank"),h("div",{className:"mv",style:{fontSize:18}},"#"+fc.rank),h("div",{className:"ms",style:{display:"flex",alignItems:"center",gap:5}},`Pos: #${fc.posRank}`,trendBadge(fc.trend30))),
        ):h("div",{className:"metric",style:{gridColumn:"span 2"}},h("div",{className:"ml"},"Dynasty Value"),h("div",{className:"mv",style:{fontSize:13,color:"var(--text3)"}},fcLoaded?"Not ranked":"Loading\u2026")),
        mostRecentPts>0&&h("div",{className:"metric"},h("div",{className:"ml"},mostRecent+" Pts"),h("div",{className:"mv",style:{fontSize:18,color:"var(--accent)"}},mostRecentPts.toFixed(0))),
        prevPts>0&&h("div",{className:"metric"},h("div",{className:"ml"},prevSeason+" Pts"),h("div",{className:"mv",style:{fontSize:18}},prevPts.toFixed(0))),
        p.height&&h("div",{className:"metric"},h("div",{className:"ml"},"Height"),h("div",{className:"mv",style:{fontSize:16}},`${Math.floor(p.height/12)}'${p.height%12}"`)),
        p.weight&&h("div",{className:"metric"},h("div",{className:"ml"},"Weight"),h("div",{className:"mv",style:{fontSize:16}},p.weight+" lb")),
      ),
      sortedSeasons.length>0&&h(Fragment,null,
        h("div",{style:{fontSize:11,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".07em",marginBottom:8}},"Career Stats (PPR)"),
        sortedSeasons.map(yr=>{
          const s=careerH[yr];const fpts=calcPPR(s);const gp=parseInt(s.gp||s.games_played||0);
          const ss=statStr(s);
          const fc2=fpts>300?"var(--accent)":fpts>200?"var(--teal)":fpts>100?"var(--text)":"var(--text3)";
          return h("div",{key:yr,style:{display:"flex",alignItems:"center",padding:"7px 0",borderBottom:"1px solid var(--border)"}},
            h("span",{style:{fontSize:13,fontWeight:600,minWidth:44,color:"var(--text2)"}},yr),
            h("span",{style:{fontSize:11,color:"var(--text3)",minWidth:30}},gp>0?gp+"gm":""),
            h("span",{style:{flex:1,fontSize:11,color:"var(--text3)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},ss),
            h("span",{style:{fontSize:14,fontWeight:600,fontFamily:"'DM Mono',monospace",color:fc2,minWidth:52,textAlign:"right"}},fpts>0?fpts.toFixed(1)+" pts":""),
          );
        })
      ),
    ),
    h("div",{className:"card"},
      h("div",{className:"ctitle"},"Dynasty Scouting Report"),
      scout?h(Fragment,null,
        h("span",{style:{display:"inline-block",fontSize:12,fontWeight:700,padding:"4px 12px",borderRadius:20,marginBottom:10,background:scout.vc+"22",color:scout.vc}},scout.verdict),
        [["Production & Value","var(--blue)",scout.s1],["Age Curve","var(--amber)",scout.s2],["Dynasty Verdict","var(--accent)",scout.s3]].map(([title,color,text])=>h("div",{key:title,style:{marginBottom:10}},
          h("div",{className:"scout-title",style:{color}},title),
          h("div",{style:{fontSize:13,color:"var(--text2)",lineHeight:1.65}},text),
        ))
      ):h("div",{style:{display:"flex",alignItems:"center",gap:8,color:"var(--text3)",fontSize:12}},h(Spinner,{size:16}),fcLoaded?"Analyzing\u2026":"Loading values\u2026"),
    ),
    h("div",{className:"card"},
      h("div",{className:"ctitle"},"Latest News \u00b7 ESPN"),
      news===undefined||news===null?h("div",{style:{display:"flex",alignItems:"center",gap:8,color:"var(--text3)",fontSize:12,padding:"4px 0"}},h(Spinner,{size:16}),"Loading\u2026"):
      news.length?news.map((a,i)=>h("div",{key:i,className:"news-item"},
        h("div",{style:{fontSize:13,fontWeight:500,marginBottom:3,lineHeight:1.4}},a.headline),
        a.desc&&h("div",{style:{fontSize:12,color:"var(--text2)",marginTop:3,lineHeight:1.5}},a.desc.slice(0,160)+(a.desc.length>160?"\u2026":"")),
        h("div",{style:{fontSize:11,color:"var(--text3)",marginTop:3}},a.date),
      )):h("div",{style:{fontSize:12,color:"var(--text3)",padding:"4px 0"}},"No recent ESPN news found"),
    ),
  );
}

// ─── NAVIGATION (simple hash-based, no library needed) ────────────────────────
function useNav(){
  const[page,setPageState]=useState(()=>location.hash.replace("#","").split("/")[0]||"home");
  const[param,setParam]=useState(()=>location.hash.replace("#","").split("/")[1]||null);
  useEffect(()=>{
    const handler=()=>{
      const parts=location.hash.replace("#","").split("/");
      setPageState(parts[0]||"home");
      setParam(parts[1]||null);
    };
    window.addEventListener("hashchange",handler);
    return()=>window.removeEventListener("hashchange",handler);
  },[]);
  const nav=(p,param)=>{location.hash=param?`${p}/${param}`:p;};
  return{page,param,nav};
}

  {id:"search",label:"Search",icon:()=>h("svg",{viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:1.75},h("circle",{cx:11,cy:11,r:7}),h("path",{d:"m21 21-4.35-4.35"}))},
];

// ─── APP SHELL ────────────────────────────────────────────────────────────────
function AppShell(){
  const{page,param,nav}=useNav();
  const{league,rosters,myRosterId,setMyRosterId,ownerName,getMyRoster,getRoster}=useApp();
  setPage=(p,param)=>nav(p,param);
  const myR=getMyRoster();
  const teamName=myR?ownerName(myR):"Dynasty HQ";
  const pageTitles={
    home:[league?.name||"Dynasty HQ","12-team \u00b7 Superflex \u00b7 PPR"],
    roster:[teamName,`${(myR?.players||[]).length} players`],
    league:["League","Power rankings & rosters"],
    trade:["Trade","Suggestions & builder"],
    search:["Search","Players & scouting"],
  };
  const[title,subtitle]=pageTitles[page]||pageTitles.home;
  const avatar=(teamName||"D").charAt(0).toUpperCase();
  return h("div",{className:"shell"},
    h("div",{className:"topbar"},
      h("div",{style:{width:36,height:36,borderRadius:8,background:"var(--accent)",color:"#0d0f12",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:700,flexShrink:0}},avatar),
      h("div",{style:{flex:1,minWidth:0}},
        h("h1",{style:{fontSize:15,fontWeight:600,letterSpacing:"-.01em",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},title),
        subtitle&&h("p",{style:{fontSize:11,color:"var(--text2)"}},subtitle),
      ),
      h("select",{className:"sel",value:myRosterId||"",onChange:e=>setMyRosterId(parseInt(e.target.value))},
        rosters.map(r=>h("option",{key:r.roster_id,value:r.roster_id},ownerName(r)))
      ),
    ),
    h("div",{className:"scroll"},
      page==="home"&&h(Home),
      page==="roster"&&h(Roster),
      page==="league"&&h(League),
      page==="trade"&&h(Trade),
      page==="search"&&h(SearchPage,{initPid:param,key:param}),
    ),
    h("nav",{className:"nav"},
      NAV.map(({id,label,icon:Icon})=>h("button",{key:id,className:`nb${page===id?" on":""}`,onClick:()=>nav(id)},h(Icon),label))
    ),
  );
}

// ─── MOUNT ────────────────────────────────────────────────────────────────────
function App(){return h(DataProvider,null,h(AppShell));}
ReactDOM.createRoot(document.getElementById('root')).render(h(App));
