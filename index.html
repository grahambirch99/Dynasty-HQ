<script type="text/babel" data-presets="react">
// Destructure React hooks globally
const { useState, useEffect, useCallback, useMemo, useRef, createContext, useContext } = React;
// Destructure React Router
const { HashRouter, Routes, Route, useLocation, useNavigate, useParams, Navigate, Link } = ReactRouterDOM;


// ═══════════ store ═══════════
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const LEAGUE_ID = "1313311335559200768";
const SLP  = "https://api.sleeper.app/v1";
const SLP2 = "https://api.sleeper.com";
const FC_URL = "https://api.fantasycalc.com/values/current?isDynasty=true&numQbs=2&numTeams=12&ppr=1";
const ESPN_NEWS = "https://site.api.espn.com/apis/site/v2/sports/football/nfl/news";
const CURRENT_SEASON = "2025";
const PLAYERS_CACHE_KEY = "dhq_players_v2";
const PLAYERS_CACHE_TTL = 24 * 60 * 60 * 1000;
const LEAGUE_CACHE_KEY = "dhq_league_v2";
const LEAGUE_CACHE_TTL = 5 * 60 * 1000;

// ─── FETCH HELPERS ─────────────────────────────────────────────────────────────
async function safeFetch(url, timeoutMs = 10000) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), timeoutMs);
  try {
    const r = await fetch(url, { signal: ctrl.signal });
    clearTimeout(timer);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return await r.json();
  } catch (e) {
    clearTimeout(timer);
    throw e;
  }
}

// ─── CACHE HELPERS ─────────────────────────────────────────────────────────────
function cacheGet(key, ttl) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const d = JSON.parse(raw);
    if (Date.now() - d.ts > ttl) return null;
    return d.data;
  } catch { return null; }
}

function cacheSet(key, data) {
  try { localStorage.setItem(key, JSON.stringify({ ts: Date.now(), data })); }
  catch (e) { console.warn("Cache write failed:", e.message); }
}

function cacheClear(key) {
  try { localStorage.removeItem(key); } catch {}
}

// ─── PPR CALCULATOR ────────────────────────────────────────────────────────────
function calcPPR(s) {
  if (!s) return 0;
  if (s.pts_ppr) return parseFloat(s.pts_ppr);
  let p = 0;
  p += (s.pass_yd || 0) * 0.04;
  p += (s.pass_td || 0) * 4;
  p -= (s.pass_int || 0) * 2;
  p += (s.rush_yd || 0) * 0.1;
  p += (s.rush_td || 0) * 6;
  p += (s.rec || 0) * 1;
  p += (s.rec_yd || 0) * 0.1;
  p += (s.rec_td || 0) * 6;
  p -= (s.fum_lost || 0) * 2;
  return parseFloat(p.toFixed(1));
}

// ─── OPTIMAL LINEUP VALUE (SF: 2QB 2RB 3WR 1TE 1FLEX) ──────────────────────────
function optimalLineupValue(rosterPlayers, fcMap) {
  const byPos = { QB: [], RB: [], WR: [], TE: [] };
  rosterPlayers.forEach(p => {
    const pos = (p.position || "").toUpperCase();
    if (byPos[pos]) byPos[pos].push({ pid: p.player_id, val: fcMap[p.player_id]?.value || 0 });
  });
  Object.values(byPos).forEach(a => a.sort((a, b) => b.val - a.val));
  const qbs = byPos.QB.slice(0, 2);
  const rbs = byPos.RB.slice(0, 2);
  const wrs = byPos.WR.slice(0, 3);
  const tes = byPos.TE.slice(0, 1);
  const used = new Set([...qbs, ...rbs, ...wrs, ...tes].map(p => p.pid));
  const flex = [...byPos.RB.slice(2), ...byPos.WR.slice(3), ...byPos.TE.slice(1)]
    .filter(p => !used.has(p.pid)).sort((a, b) => b.val - a.val).slice(0, 1);
  return [...qbs, ...rbs, ...wrs, ...tes, ...flex].reduce((s, p) => s + p.val, 0);
}

// ─── OWNER NAME ────────────────────────────────────────────────────────────────
function ownerName(roster, users) {
  if (!roster) return "Unknown";
  const u = users[roster.owner_id];
  return u?.metadata?.team_name || u?.display_name || u?.username || `Team ${roster.roster_id}`;
}

// ─── GRADE ─────────────────────────────────────────────────────────────────────
function gradeOf(avg) {
  if (avg > 8000) return { g: "A+", cls: "grade-s" };
  if (avg > 6000) return { g: "A",  cls: "grade-a" };
  if (avg > 3500) return { g: "B",  cls: "grade-b" };
  if (avg > 1500) return { g: "C",  cls: "grade-c" };
  return { g: "D", cls: "grade-d" };
}

// ─── TEAM MODE CLASSIFIER ──────────────────────────────────────────────────────
function classifyTeam(rosterPlayers, fcMap) {
  if (!rosterPlayers.length) return "Unknown";
  const top10 = [...rosterPlayers].sort((a, b) => (fcMap[b.player_id]?.value || 0) - (fcMap[a.player_id]?.value || 0)).slice(0, 10);
  const ages = top10.map(p => p.age || (p.birth_date ? Math.floor((Date.now() - new Date(p.birth_date)) / 31557600000) : null)).filter(Boolean);
  const avgAge = ages.length ? ages.reduce((a, b) => a + b, 0) / ages.length : 0;
  const lineupVal = optimalLineupValue(rosterPlayers, fcMap);
  if (avgAge < 24.5 && lineupVal < 32000) return "Rebuilding";
  if (avgAge < 25.5 && lineupVal < 45000) return "Rebuilding";
  if (avgAge >= 27.5 && lineupVal > 55000) return "Win Now";
  if (avgAge >= 26 && lineupVal > 45000) return "Contender";
  return "Transitional";
}

// ─── TRADE SUGGESTIONS ENGINE ──────────────────────────────────────────────────
function generateTradeSuggestions(myRoster, myPlayers, allRosters, allPlayers, fcMap, histStats, users) {
  const myMode = classifyTeam(myPlayers, fcMap);
  const myLineupVal = optimalLineupValue(myPlayers, fcMap);

  // Positional needs scoring
  const myByPos = {};
  myPlayers.forEach(p => {
    const pos = (p.position || "").toUpperCase();
    myByPos[pos] = (myByPos[pos] || 0) + 1;
  });

  const suggestions = [];

  allRosters.forEach(theirRoster => {
    if (theirRoster.roster_id === myRoster.roster_id) return;
    const theirPlayers = (theirRoster.players || []).map(pid => ({ player_id: pid, ...allPlayers[pid] })).filter(p => p.full_name);
    if (!theirPlayers.length) return;
    const theirMode = classifyTeam(theirPlayers, fcMap);
    const theirName = ownerName(theirRoster, users);

    // Find players I could send (my lower-value players at positions they need)
    const theirByPos = {};
    theirPlayers.forEach(p => { const pos = (p.position || "").toUpperCase(); theirByPos[pos] = (theirByPos[pos] || 0) + 1; });

    // Generate 1-for-1 trade ideas
    const mySorted = [...myPlayers].sort((a, b) => (fcMap[b.player_id]?.value || 0) - (fcMap[a.player_id]?.value || 0));
    const theirSorted = [...theirPlayers].sort((a, b) => (fcMap[b.player_id]?.value || 0) - (fcMap[a.player_id]?.value || 0));

    // Look for value-upgrading trades (I give less FC, they give more)
    for (let i = 3; i < Math.min(mySorted.length, 15); i++) {
      const send = mySorted[i];
      const sendVal = fcMap[send.player_id]?.value || 0;
      if (sendVal < 500) continue;

      for (let j = 0; j < Math.min(theirSorted.length, 12); j++) {
        const recv = theirSorted[j];
        const recvVal = fcMap[recv.player_id]?.value || 0;
        if (recvVal < 500) continue;

        // Skip if same player somehow
        if (send.player_id === recv.player_id) continue;

        const fcDelta = recvVal - sendVal;
        // Only suggest if reasonably close in value (within 30%) OR I'm getting more
        if (Math.abs(fcDelta) > sendVal * 0.5) continue;

        // Positional fit: does receiving this player help me?
        const recvPos = (recv.position || "").toUpperCase();
        const sendPos = (send.position || "").toUpperCase();

        // Mode compatibility scoring
        let fitScore = 50;

        // Rebuilding teams want youth and picks
        const recvAge = recv.age || 25;
        const sendAge = send.age || 25;

        if (theirMode === "Rebuilding" || theirMode === "Transitional") {
          // They want: older proven players, we want: younger upside
          if (sendAge > recvAge + 2) fitScore += 20;
          if (recvAge < 25) fitScore += 15;
        }
        if (theirMode === "Win Now" || theirMode === "Contender") {
          // They want: proven vets, we have: youth
          if (sendAge < recvAge) fitScore += 15;
          if (recvVal > sendVal) fitScore += 10;
        }

        // Positional need bonus
        const myNeedPos = myByPos[recvPos] < 3 ? 10 : 0;
        fitScore += myNeedPos;

        // Projection delta (use latest season PPR)
        const getLatestPts = (pid) => {
          const h = histStats[pid];
          if (!h) return 0;
          const seasons = Object.keys(h).sort((a, b) => b - a);
          for (const s of seasons) {
            const v = calcPPR(h[s]);
            if (v > 0) return v;
          }
          return 0;
        };
        const projDelta = Math.round(getLatestPts(recv.player_id) - getLatestPts(send.player_id));

        if (fitScore >= 50) {
          suggestions.push({
            id: `${theirRoster.roster_id}-${send.player_id}-${recv.player_id}`,
            theirRosterId: theirRoster.roster_id,
            theirName,
            theirMode,
            fitScore,
            send: [{ ...send, value: sendVal }],
            receive: [{ ...recv, value: recvVal }],
            fcDelta,
            projDelta,
            explanation: buildTradeExplanation(send, recv, sendVal, recvVal, theirMode, myMode, projDelta, fitScore),
          });
        }
      }
    }
  });

  // Sort by fit score desc, deduplicate by their team (max 2 per team)
  const teamCounts = {};
  return suggestions
    .sort((a, b) => b.fitScore - a.fitScore)
    .filter(s => {
      teamCounts[s.theirRosterId] = (teamCounts[s.theirRosterId] || 0) + 1;
      return teamCounts[s.theirRosterId] <= 2;
    })
    .slice(0, 10);
}

function buildTradeExplanation(send, recv, sendVal, recvVal, theirMode, myMode, projDelta, fitScore) {
  const sendName = send.full_name?.split(" ").pop() || send.full_name || "";
  const recvName = recv.full_name?.split(" ").pop() || recv.full_name || "";
  const sendAge = send.age || "?";
  const recvAge = recv.age || "?";
  let parts = [];

  if (theirMode === "Rebuilding" || theirMode === "Transitional") {
    parts.push(`${theirMode.toLowerCase()} team happy to acquire ${sendName} (${sendAge}) for upside`);
  } else {
    parts.push(`${theirMode.toLowerCase()} team wants proven contributors`);
  }

  if (recvVal > sendVal) {
    parts.push(`you upgrade value by ${(recvVal - sendVal).toLocaleString()}`);
  } else if (sendVal > recvVal) {
    parts.push(`you trade down ${(sendVal - recvVal).toLocaleString()} in value but gain ${recvAge < sendAge ? "age curve" : "positional fit"}`);
  }

  if (projDelta > 50) parts.push(`projection favors you by ${projDelta}`);
  else if (projDelta < -50) parts.push(`they get better recent production`);

  return parts.map((p, i) => i === 0 ? p.charAt(0).toUpperCase() + p.slice(1) : p).join("; ") + ".";
}

// ─── TEAM ANALYSIS ENGINE ──────────────────────────────────────────────────────
function buildTeamAnalysis(rosterPlayers, fcMap, lineupRanks, rosterId) {
  if (!rosterPlayers.length || !Object.keys(fcMap).length) return null;

  const byPos = { QB: [], RB: [], WR: [], TE: [] };
  rosterPlayers.forEach(p => {
    const pos = (p.position || "").toUpperCase();
    if (byPos[pos]) byPos[pos].push(p);
  });
  Object.values(byPos).forEach(a => a.sort((x, y) => (fcMap[y.player_id]?.value || 0) - (fcMap[x.player_id]?.value || 0)));

  const top10 = [...rosterPlayers].sort((a, b) => (fcMap[b.player_id]?.value || 0) - (fcMap[a.player_id]?.value || 0)).slice(0, 10);
  const ages = top10.map(p => p.age || (p.birth_date ? Math.floor((Date.now() - new Date(p.birth_date)) / 31557600000) : null)).filter(Boolean);
  const avgAge = ages.length ? (ages.reduce((a, b) => a + b, 0) / ages.length).toFixed(1) : "?";
  const lineupVal = optimalLineupValue(rosterPlayers, fcMap);
  const lrank = (lineupRanks.findIndex(r => r.roster_id === rosterId) + 1) || "?";
  const qbVal = (byPos.QB[0] ? fcMap[byPos.QB[0].player_id]?.value || 0 : 0) + (byPos.QB[1] ? fcMap[byPos.QB[1].player_id]?.value || 0 : 0);
  const wrVal = byPos.WR.slice(0, 3).reduce((s, p) => s + (fcMap[p.player_id]?.value || 0), 0);
  const rbVal = byPos.RB.slice(0, 2).reduce((s, p) => s + (fcMap[p.player_id]?.value || 0), 0);
  const netTrend = top10.reduce((s, p) => s + (fcMap[p.player_id]?.trend30 || 0), 0);

  let mode, modeColor;
  const lv = lineupVal;
  const aa = parseFloat(avgAge);
  if (aa < 24.5 && lv < 32000) { mode = "Full Rebuild"; modeColor = "#f25c54"; }
  else if (aa < 25.5 && lv < 45000) { mode = "Rebuilding"; modeColor = "#f6a623"; }
  else if (aa >= 27.5 && lv > 55000) { mode = "Win Now"; modeColor = "#a78bfa"; }
  else if (aa >= 26 && lv > 45000) { mode = "Contender"; modeColor = "#4f8ef7"; }
  else { mode = "Transitional"; modeColor = "#2dd4bf"; }

  const qb1 = byPos.QB[0], qb2 = byPos.QB[1];
  const qbStr = [qb1, qb2].filter(Boolean).map(p => p.full_name?.split(" ").pop() || "").join(" & ");
  const wrStr = byPos.WR.slice(0, 2).map(p => p.full_name?.split(" ").pop() || "").join(" / ");
  const rbStr = byPos.RB.slice(0, 2).map(p => p.full_name?.split(" ").pop() || "").join(" / ");

  const p1 = mode === "Contender"
    ? `This is a legitimate contender. Core age of ${avgAge} with a starting lineup that ranks #${lrank} in the league (${lineupVal.toLocaleString()}). You have both a competitive window now and some long-term upside — a rare combination in dynasty.`
    : mode === "Win Now"
    ? `This is a win-now team. Core averages ${avgAge} years old — the window is open. Starting lineup ranks #${lrank} in the league (${lineupVal.toLocaleString()}). Every move should optimize for a championship in the next 1–2 seasons.`
    : mode.includes("Rebuild")
    ? `This is a ${mode.toLowerCase()} team with a ${avgAge}-year average core age. Starting lineup ranks #${lrank} in the league (${lineupVal.toLocaleString()}). The priority is acquiring young talent and future draft capital.`
    : `Transitional roster. Core age of ${avgAge}, starting lineup ranks #${lrank} (${lineupVal.toLocaleString()}). The right move could tip things in either direction.`;

  const p2parts = [];
  if (qbStr) p2parts.push(`QB room (${qbStr}, combined SF value: ${qbVal.toLocaleString()}) is your ${qbVal > 14000 ? "biggest strength" : "biggest need in superflex"}.`);
  if (wrVal > 18000) p2parts.push(`WR corps is elite led by ${wrStr}.`);
  else if (wrVal < 10000) p2parts.push(`WR is thin — a clear area to upgrade.`);
  if (rbVal > 12000) p2parts.push(`RB depth is strong with ${rbStr}.`);
  else if (rbVal < 6000) p2parts.push(`RB corps is a weakness.`);
  const p2 = p2parts.join(" ") || "Positional breakdown looks balanced.";

  let p3 = netTrend > 500 ? `Top assets are trending up collectively (+${netTrend} 30-day). ` : netTrend < -500 ? `Top assets have lost value recently (${netTrend} combined 30-day trend) — worth monitoring. ` : "";
  if (mode === "Win Now" || mode === "Contender") {
    p3 += qbVal < 10000 ? "Priority move: upgrade your QB room. In superflex, elite QBs are worth overpaying for." : wrVal < 14000 ? "Priority move: add a WR1-caliber weapon." : "You're well-built. Look to add depth or trade future picks for proven contributors.";
  } else {
    p3 += "Focus on acquiring 2026–2027 draft picks and targeting players on the age curve (22–24).";
  }

  const strengths = [], concerns = [];
  if (qbVal > 14000) strengths.push("Elite QB room");
  else if (qbVal < 6000) concerns.push("Weak QB room");
  if (wrVal > 18000) strengths.push("Deep WR corps");
  else if (wrVal < 9000) concerns.push("Thin at WR");
  if (rbVal > 12000) strengths.push("Strong RB depth");
  else if (rbVal < 5000) concerns.push("RB weakness");
  if (netTrend > 400) strengths.push("Assets trending ▲");
  if (netTrend < -400) concerns.push("Assets trending ▼");
  if (lrank !== "?" && lrank <= 3) strengths.push(`Top-${lrank} lineup power`);
  if (lrank !== "?" && lrank >= 10) concerns.push("Bottom-3 lineup power");

  return { mode, modeColor, p1, p2, p3, strengths, concerns, avgAge, lineupVal, lrank, netTrend, qbVal };
}

// ─── SCOUTING REPORT ───────────────────────────────────────────────────────────
function buildScoutReport(pid, players, fcMap, histStats) {
  const p = players[pid];
  if (!p) return null;
  const fc = fcMap[pid];
  const pos = (p.position || "").toUpperCase();
  const age = p.age || (p.birth_date ? Math.floor((Date.now() - new Date(p.birth_date)) / 31557600000) : null) || 0;
  const val = fc?.value || 0;
  const rank = fc?.rank || 9999;
  const trend = fc?.trend30 || 0;

  const careerH = histStats[pid] || {};
  const sortedSeasons = Object.keys(careerH).sort((a, b) => b - a);
  const latestSeason = sortedSeasons[0];
  const prevSeason = sortedSeasons[1];
  const latestPPR = latestSeason ? calcPPR(careerH[latestSeason]) : null;
  const prevPPR = prevSeason ? calcPPR(careerH[prevSeason]) : null;

  let prodTrend = "stable";
  if (latestPPR !== null && prevPPR !== null) {
    if (latestPPR - prevPPR > 30) prodTrend = "rising";
    else if (latestPPR - prevPPR < -30) prodTrend = "declining";
  }

  const ageCurves = { QB: { peak: [27, 34] }, RB: { peak: [23, 26] }, WR: { peak: [24, 29] }, TE: { peak: [26, 30] } };
  const curve = ageCurves[pos] || ageCurves.WR;
  const inPeak = age >= curve.peak[0] && age <= curve.peak[1];
  const prePeak = age < curve.peak[0];
  const postPeak = age > curve.peak[1];

  let verdict, verdictColor;
  if (prePeak && val > 2000 && trend >= 0) { verdict = "BUY"; verdictColor = "#3ecf8e"; }
  else if (postPeak && prodTrend === "declining" && age > 30) { verdict = "SELL"; verdictColor = "#f25c54"; }
  else if (prodTrend === "rising" && val > 2000) { verdict = "BUY"; verdictColor = "#3ecf8e"; }
  else if (trend < -200 && postPeak) { verdict = "SELL"; verdictColor = "#f25c54"; }
  else { verdict = "HOLD"; verdictColor = "#f6a623"; }

  let s1 = val > 6000 ? `${p.full_name} is an elite dynasty asset ranked #${rank} overall (SF value: ${val.toLocaleString()}). ` :
            val > 3000 ? `${p.full_name} is a solid dynasty contributor ranked #${rank} overall (SF value: ${val.toLocaleString()}). ` :
            val > 0 ? `${p.full_name} has modest dynasty value at #${rank} overall (SF value: ${val.toLocaleString()}). ` :
            `${p.full_name} is currently unranked on FantasyCalc. `;

  if (sortedSeasons.length) {
    const pts = sortedSeasons.slice(0, 3).map(yr => `${yr}: ${calcPPR(careerH[yr]).toFixed(0)} pts`).join(", ");
    s1 += `Season PPR totals — ${pts}. `;
    s1 += prodTrend === "rising" ? "Production is trending upward." : prodTrend === "declining" ? "Production has declined recently." : "Production has been relatively consistent.";
  }

  const firstName = p.full_name?.split(" ")[0] || p.full_name || "";
  let s2 = prePeak
    ? `At ${age}, ${firstName} is ${curve.peak[0] - age > 0 ? `${curve.peak[0] - age} year${curve.peak[0] - age > 1 ? "s" : ""} away from their peak window (${curve.peak[0]}–${curve.peak[1]} for ${pos})` : "just entering their peak window"}. The best years should still be ahead.`
    : inPeak ? `At ${age}, ${firstName} is right in their peak window (${curve.peak[0]}–${curve.peak[1]} for ${pos}). What you see is what you get — this is the prime of their dynasty value.`
    : `At ${age}, ${firstName} is ${age - curve.peak[1]} year${age - curve.peak[1] > 1 ? "s" : ""} past the typical ${pos} peak. ${age > 32 ? "Age-related decline is a real risk." : "There may be 1–2 more productive seasons."}`;

  let s3 = verdict === "BUY" ? `Verdict: BUY. ${prePeak ? "Young age curve + strong value makes this an ideal target." : "Rising production suggests the market may be undervaluing this player."}`
         : verdict === "SELL" ? "Verdict: SELL. Age, declining production, and negative trends suggest selling for younger talent or picks is the value-maximizing move."
         : `Verdict: HOLD. ${inPeak ? "In their peak window with stable value — not a sell unless you're getting an elite return." : "No compelling reason to move in either direction."}`;
  if (Math.abs(trend) >= 50) s3 += ` Note: 30-day FC trend is ${trend > 0 ? `+${trend} (rising)` : `${trend} (falling)`}.`;

  return { verdict, verdictColor, s1, s2, s3, prodTrend, age, inPeak, prePeak };
}

// ═══════════ DataContext ═══════════
const DataContext = createContext(null);

function DataProvider({ children }) {
  const [league, setLeague]         = useState(null);
  const [rosters, setRosters]       = useState([]);
  const [users, setUsers]           = useState({});
  const [players, setPlayers]       = useState({});
  const [fcMap, setFcMap]           = useState({});
  const [proj, setProj]             = useState({});
  const [histStats, setHistStats]   = useState({});
  const [transactions, setTxns]     = useState([]);
  const [tradedPicks, setTradedPicks] = useState([]);
  const [nflState, setNflState]     = useState(null);
  const [myRosterId, setMyRosterId] = useState(null);
  const [newsCache, setNewsCache]   = useState({});
  const [lineupRanks, setLineupRanks] = useState([]);

  // Status flags
  const [leagueLoaded, setLeagueLoaded] = useState(false);
  const [playersLoaded, setPlayersLoaded] = useState(false);
  const [fcLoaded, setFcLoaded]     = useState(false);
  const [statsLoaded, setStatsLoaded] = useState(false);
  const [txnLoaded, setTxnLoaded]   = useState(false);
  const [leagueError, setLeagueError] = useState(null);

  const playerCount = Object.keys(players).length;
  const histLoadedRef = useRef(false);

  // ── Compute lineup ranks whenever fcMap or rosters change ──────────────────
  useEffect(() => {
    if (!fcLoaded || !rosters.length) return;
    const ranked = rosters.map(r => {
      const pl = (r.players || []).map(pid => ({ player_id: pid, ...players[pid] }));
      return {
        roster_id: r.roster_id,
        name: ownerName(r, users),
        lineupVal: optimalLineupValue(pl, fcMap),
        totalVal: pl.reduce((s, p) => s + (fcMap[p.player_id]?.value || 0), 0),
        wins: r.settings?.wins || 0,
        losses: r.settings?.losses || 0,
      };
    }).sort((a, b) => b.lineupVal - a.lineupVal);
    setLineupRanks(ranked);
  }, [fcMap, rosters, players, fcLoaded, users]);

  // ── LOAD LEAGUE (with cache) ────────────────────────────────────────────────
  const loadLeague = useCallback(async () => {
    // Try cache first for instant render
    const cached = cacheGet(LEAGUE_CACHE_KEY, LEAGUE_CACHE_TTL);
    if (cached) {
      setLeague(cached.league);
      setRosters(cached.rosters);
      const uMap = {};
      cached.users.forEach(u => { uMap[u.user_id] = u; });
      setUsers(uMap);
      setMyRosterId(cached.rosters[0]?.roster_id);
      setLeagueLoaded(true);
    }

    // Always fetch fresh in background
    try {
      const [lg, rs, uArr] = await Promise.all([
        safeFetch(`${SLP}/league/${LEAGUE_ID}`, 8000),
        safeFetch(`${SLP}/league/${LEAGUE_ID}/rosters`, 8000),
        safeFetch(`${SLP}/league/${LEAGUE_ID}/users`, 8000),
      ]);
      setLeague(lg);
      setRosters(rs);
      const uMap = {};
      uArr.forEach(u => { uMap[u.user_id] = u; });
      setUsers(uMap);
      if (!cached) setMyRosterId(rs[0]?.roster_id);
      cacheSet(LEAGUE_CACHE_KEY, { league: lg, rosters: rs, users: uArr });
      setLeagueLoaded(true);
      setLeagueError(null);
    } catch (e) {
      if (!cached) setLeagueError(e.message);
    }
  }, []);

  // ── LOAD PLAYERS (localStorage cache) ──────────────────────────────────────
  const loadPlayers = useCallback(async () => {
    // Check cache first
    const cached = cacheGet(PLAYERS_CACHE_KEY, PLAYERS_CACHE_TTL);
    if (cached && Object.keys(cached).length > 100) {
      setPlayers(cached);
      setPlayersLoaded(true);
      // Background refresh if older than 12h
      const cacheEntry = (() => { try { return JSON.parse(localStorage.getItem(PLAYERS_CACHE_KEY)); } catch { return null; } })();
      if (cacheEntry && Date.now() - cacheEntry.ts > 12 * 3600000) {
        fetchAndCachePlayers(false);
      }
      return;
    }
    await fetchAndCachePlayers(true);
  }, []);

  const fetchAndCachePlayers = useCallback(async (setAfter) => {
    try {
      const data = await safeFetch(`${SLP}/players/nfl`, 30000);
      // Slim down the payload before caching
      const slim = {};
      Object.entries(data).forEach(([pid, p]) => {
        if (!p.full_name) return;
        slim[pid] = {
          player_id: pid, full_name: p.full_name, position: p.position,
          fantasy_positions: p.fantasy_positions, team: p.team, age: p.age,
          birth_date: p.birth_date, years_exp: p.years_exp, height: p.height,
          weight: p.weight, college: p.college, espn_id: p.espn_id, stats_id: p.stats_id,
        };
      });
      cacheSet(PLAYERS_CACHE_KEY, slim);
      if (setAfter) {
        setPlayers(slim);
        setPlayersLoaded(true);
      } else {
        setPlayers(slim); // silent refresh
      }
    } catch (e) {
      console.warn("Players fetch failed, trying individual fallback:", e.message);
      // Fallback: fetch rostered players only
      const pids = [...new Set(rosters.flatMap(r => r.players || []))];
      const result = {};
      for (let i = 0; i < pids.length; i += 8) {
        await Promise.all(pids.slice(i, i + 8).map(async pid => {
          try {
            const p = await safeFetch(`${SLP}/players/nfl/${pid}`, 5000);
            if (p?.full_name) result[pid] = p;
          } catch {}
        }));
      }
      setPlayers(result);
      setPlayersLoaded(true);
    }
  }, [rosters]);

  // ── LOAD FC VALUES ──────────────────────────────────────────────────────────
  const loadFC = useCallback(async () => {
    try {
      const data = await safeFetch(FC_URL, 10000);
      const map = {};
      data.forEach(item => {
        const pid = item.player?.sleeperId;
        if (pid) map[pid] = {
          value: item.value || 0, rank: item.overallRank || 9999,
          posRank: item.positionRank || 9999, trend30: item.trend30Day || 0,
        };
      });
      setFcMap(map);
      setFcLoaded(true);
    } catch (e) { console.warn("FC failed:", e.message); }
  }, []);

  // ── LOAD PROJECTIONS ────────────────────────────────────────────────────────
  const loadProj = useCallback(async (nfl) => {
    try {
      const wk = Math.min(nfl?.week || 1, 18);
      const positions = ["QB", "RB", "WR", "TE"];
      const allProj = {};
      await Promise.all(positions.map(async pos => {
        try {
          const url = `${SLP2}/projections/nfl/${CURRENT_SEASON}/${wk}?season_type=regular&position[]=${pos}`;
          const data = await safeFetch(url, 10000);
          if (Array.isArray(data)) {
            data.forEach(item => {
              if (item.player_id && item.stats) allProj[item.player_id] = item.stats;
            });
          } else if (typeof data === "object") {
            Object.assign(allProj, data);
          }
        } catch {}
      }));
      setProj(allProj);
    } catch (e) { console.warn("Proj failed:", e.message); }
  }, []);

  // ── LOAD CAREER STATS ───────────────────────────────────────────────────────
  const loadHistStats = useCallback(async (rosterList, playerList) => {
    if (histLoadedRef.current) return;
    histLoadedRef.current = true;

    const allPids = [...new Set(rosterList.flatMap(r => r.players || []))];
    const myPids = rosterList[0]?.players || [];
    const rest = allPids.filter(p => !myPids.includes(p));
    const ordered = [...myPids, ...rest];
    const seasons = ["2019", "2020", "2021", "2022", "2023", "2024", "2025"];

    const newStats = {};

    for (let i = 0; i < ordered.length; i += 6) {
      const chunk = ordered.slice(i, i + 6);
      await Promise.all(chunk.map(async pid => {
        try {
          const results = await Promise.all(seasons.map(season =>
            fetch(`${SLP2}/stats/nfl/player/${pid}?season_type=regular&season=${season}&grouping=season`)
              .then(r => r.ok ? r.json() : null).catch(() => null)
          ));
          const career = {};
          seasons.forEach((season, idx) => {
            const d = results[idx];
            if (d?.stats && Object.keys(d.stats).length > 0) career[season] = d.stats;
          });
          if (Object.keys(career).length > 0) newStats[pid] = career;
        } catch {}
      }));
      if (i === 0) {
        setHistStats({ ...newStats });
        setStatsLoaded(true);
      }
    }
    setHistStats({ ...newStats });
    setStatsLoaded(true);
  }, []);

  // ── LOAD TRANSACTIONS ───────────────────────────────────────────────────────
  const loadTxns = useCallback(async (nfl) => {
    try {
      const weeks = Math.min(nfl?.leg || 1, 18);
      const all = [];
      for (let w = 1; w <= weeks; w += 4) {
        const batch = [];
        for (let b = w; b < Math.min(w + 4, weeks + 1); b++) {
          batch.push(safeFetch(`${SLP}/league/${LEAGUE_ID}/transactions/${b}`, 8000).catch(() => []));
        }
        const res = await Promise.all(batch);
        res.forEach(arr => { if (Array.isArray(arr)) all.push(...arr); });
      }
      setTxns(all.filter(t => t.status === "complete").sort((a, b) => (b.status_updated || 0) - (a.status_updated || 0)));
      setTxnLoaded(true);
    } catch (e) { console.warn("Txns failed:", e.message); }
  }, []);

  // ── FETCH ESPN NEWS ─────────────────────────────────────────────────────────
  const fetchNews = useCallback(async (pid) => {
    if (newsCache[pid] !== undefined) return newsCache[pid];
    const p = players[pid];
    const espnId = p?.espn_id || p?.stats_id;
    if (!espnId) {
      setNewsCache(prev => ({ ...prev, [pid]: [] }));
      return [];
    }
    try {
      const d = await safeFetch(`${ESPN_NEWS}?athlete=${espnId}&limit=5`, 8000);
      const articles = (d?.articles || []).slice(0, 4).map(a => ({
        headline: a.headline || "", desc: a.description || "",
        date: a.published ? new Date(a.published).toLocaleDateString("en-US", { month: "short", day: "numeric" }) : "",
        url: a.links?.web?.href || "",
      }));
      setNewsCache(prev => ({ ...prev, [pid]: articles }));
      return articles;
    } catch {
      setNewsCache(prev => ({ ...prev, [pid]: [] }));
      return [];
    }
  }, [players, newsCache]);

  const clearPlayersCache = useCallback(() => {
    cacheClear(PLAYERS_CACHE_KEY);
    setPlayers({});
    setPlayersLoaded(false);
    loadPlayers();
  }, [loadPlayers]);

  // ── BOOT SEQUENCE ───────────────────────────────────────────────────────────
  useEffect(() => {
    loadLeague();
    loadFC();
    loadPlayers();

    // NFL state → projections + transactions (low priority)
    safeFetch(`${SLP}/state/nfl`, 10000).then(nfl => {
      setNflState(nfl);
      loadProj(nfl);
      setTimeout(() => loadTxns(nfl), 2000);
    }).catch(() => {
      loadProj(null);
    });

    safeFetch(`${SLP}/league/${LEAGUE_ID}/traded_picks`, 8000)
      .then(d => setTradedPicks(d)).catch(() => {});
  }, []);

  // ── Load hist stats once we have rosters + players ──────────────────────────
  useEffect(() => {
    if (leagueLoaded && playersLoaded && rosters.length && !histLoadedRef.current) {
      setTimeout(() => loadHistStats(rosters, players), 1000);
    }
  }, [leagueLoaded, playersLoaded, rosters.length]);

  const getRosterPlayers = useCallback((roster) => {
    return (roster?.players || []).map(pid => ({ player_id: pid, ...players[pid] }));
  }, [players]);

  const getMyRoster = useCallback(() => {
    return rosters.find(r => r.roster_id === myRosterId) || rosters[0];
  }, [rosters, myRosterId]);

  return (
    <DataContext.Provider value={{
      league, rosters, users, players, fcMap, proj, histStats,
      transactions, tradedPicks, nflState, myRosterId, setMyRosterId,
      newsCache, lineupRanks, leagueLoaded, playersLoaded, fcLoaded,
      statsLoaded, txnLoaded, leagueError, playerCount, fetchNews,
      getRosterPlayers, getMyRoster, clearPlayersCache,
      ownerName: (r) => ownerName(r, users),
    }}>
      {children}
    </DataContext.Provider>
  );
}

const POS_TARGETS = { QB: 2, RB: 6, WR: 8, TE: 2 };
const SORT_OPTS = [
  { value: "value", label: "Val" },
  { value: "rank",  label: "Rank" },
  { value: "pts",   label: "Pts" },
  { value: "age",   label: "Age" },
];
const POS_FILTERS = ["ALL", "QB", "RB", "WR", "TE"];

function Roster() {
  const { fcMap, histStats, tradedPicks, rosters, ownerName, getRosterPlayers, getMyRoster, myRosterId, playersLoaded } = useData();
  const [posFilter, setPosFilter] = useState("ALL");
  const [sortMode, setSortMode]   = useState("value");
  const navigate = useNavigate();

  const myRoster = getMyRoster();
  const allPlayers = useMemo(() => getRosterPlayers(myRoster), [myRoster, getRosterPlayers]);

  const getLatestPts = (pid) => {
    const h = histStats[pid];
    if (!h) return 0;
    const seasons = Object.keys(h).sort((a, b) => b - a);
    for (const s of seasons) { const v = calcPPR(h[s]); if (v > 0) return v; }
    return 0;
  };

  const filtered = useMemo(() => {
    let list = posFilter === "ALL" ? allPlayers : allPlayers.filter(p => (p.position || "").toUpperCase() === posFilter);
    return [...list].sort((a, b) => {
      if (sortMode === "value") return (fcMap[b.player_id]?.value || 0) - (fcMap[a.player_id]?.value || 0);
      if (sortMode === "rank")  return (fcMap[a.player_id]?.rank || 9999) - (fcMap[b.player_id]?.rank || 9999);
      if (sortMode === "pts")   return getLatestPts(b.player_id) - getLatestPts(a.player_id);
      // age: youngest first
      const ay = parseInt(a.birth_date?.split("-")[0] || "1990");
      const by = parseInt(b.birth_date?.split("-")[0] || "1990");
      return by - ay;
    });
  }, [allPlayers, posFilter, sortMode, fcMap, histStats]);

  const byPos = useMemo(() => {
    const m = {};
    allPlayers.forEach(p => { const pos = (p.position || "?").toUpperCase(); m[pos] = (m[pos] || 0) + 1; });
    return m;
  }, [allPlayers]);

  const myPicks = tradedPicks.filter(pk => pk.owner_id === myRoster?.roster_id);
  const gonePicks = tradedPicks.filter(pk => pk.roster_id === myRoster?.roster_id && pk.owner_id !== myRoster?.roster_id);

  const rosterById = (id) => rosters.find(r => r.roster_id === parseInt(id));

  if (!playersLoaded) {
    return (
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "3rem 0", gap: 12 }}>
        <Spinner size={28} />
        <p style={{ color: "var(--text2)", fontSize: 13 }}>Loading player data…</p>
      </div>
    );
  }

  return (
    <div className="fade-in">
      {/* Position counts */}
      <div className="grid4">
        {["QB", "RB", "WR", "TE"].map(pos => (
          <div key={pos} style={{ background: "var(--bg3)", borderRadius: 10, padding: "8px 10px" }}>
            <div style={{ fontSize: 10, color: "var(--text3)", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 2 }}>{pos}</div>
            <div style={{ fontSize: 18, fontWeight: 600, letterSpacing: "-0.02em" }}>{byPos[pos] || 0}</div>
          </div>
        ))}
      </div>

      {/* Filters + sort */}
      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 10, flexWrap: "wrap" }}>
        {POS_FILTERS.map(p => (
          <button key={p} onClick={() => setPosFilter(p)} style={{
            padding: "4px 10px", borderRadius: 7, border: "1px solid",
            cursor: "pointer", fontFamily: "inherit", fontSize: 11, fontWeight: 500,
            borderColor: p === posFilter ? "rgba(62,207,142,.4)" : "var(--border2)",
            background: p === posFilter ? "rgba(62,207,142,.14)" : "var(--bg3)",
            color: p === posFilter ? "var(--accent)" : "var(--text)",
          }}>{p}</button>
        ))}
        <div style={{ marginLeft: "auto", display: "flex", gap: 4 }}>
          {SORT_OPTS.map(o => (
            <button key={o.value} onClick={() => setSortMode(o.value)} style={{
              padding: "4px 9px", borderRadius: 7, border: "1px solid",
              cursor: "pointer", fontFamily: "inherit", fontSize: 11, fontWeight: 500,
              borderColor: o.value === sortMode ? "rgba(79,142,247,.4)" : "var(--border2)",
              background: o.value === sortMode ? "rgba(79,142,247,.14)" : "var(--bg3)",
              color: o.value === sortMode ? "var(--accent-blue)" : "var(--text)",
            }}>{o.label}</button>
          ))}
        </div>
      </div>

      {/* Roster */}
      <Card>
        <CardTitle>{ownerName(myRoster)} · {allPlayers.length} players</CardTitle>
        {filtered.map(p => {
          const pts = sortMode === "pts" ? getLatestPts(p.player_id) : undefined;
          return (
            <PlayerRow
              key={p.player_id}
              player={p}
              fcMap={fcMap}
              showVal={sortMode !== "rank"}
              showRank={sortMode === "rank"}
              showTrend={true}
              showPts={pts > 0 ? pts : undefined}
              onClick={() => navigate(`/search/${p.player_id}`)}
            />
          );
        })}
        {!filtered.length && <Empty>No players</Empty>}
      </Card>

      {/* Picks you own */}
      {myPicks.length > 0 && (
        <Card>
          <CardTitle>Draft Picks You Own</CardTitle>
          {myPicks.sort((a, b) => a.season - b.season || a.round - b.round).map((pk, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 0", borderBottom: "1px solid var(--border)" }}>
              <span style={{ fontSize: 11, fontWeight: 600, fontFamily: "'DM Mono', monospace", padding: "2px 7px", borderRadius: 4, background: "rgba(167,139,250,.12)", color: "var(--purple)" }}>
                {pk.season} R{pk.round}
              </span>
              <span style={{ fontSize: 12, color: "var(--text2)" }}>via {ownerName(rosterById(pk.roster_id))}</span>
            </div>
          ))}
        </Card>
      )}

      {/* Picks traded away */}
      {gonePicks.length > 0 && (
        <Card>
          <CardTitle>Picks Traded Away</CardTitle>
          {gonePicks.sort((a, b) => a.season - b.season || a.round - b.round).map((pk, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 0", borderBottom: "1px solid var(--border)" }}>
              <span style={{ fontSize: 11, fontWeight: 600, fontFamily: "'DM Mono', monospace", padding: "2px 7px", borderRadius: 4, background: "rgba(242,92,84,.1)", color: "var(--red)" }}>
                {pk.season} R{pk.round}
              </span>
              <span style={{ fontSize: 12, color: "var(--text2)" }}>to {ownerName(rosterById(pk.owner_id))}</span>
            </div>
          ))}
        </Card>
      )}

      {/* Depth needs */}
      <Card>
        <CardTitle>Depth Needs</CardTitle>
        {Object.entries(POS_TARGETS).map(([pos, target]) => {
          const have = byPos[pos] || 0;
          const pct = Math.min(100, Math.round((have / target) * 100));
          const color = have >= target ? "#3ecf8e" : have >= target * 0.7 ? "#f6a623" : "#f25c54";
          return (
            <div key={pos} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
              <PosBadge pos={pos} style={{ width: 30 }} />
              <div style={{ flex: 1, height: 4, background: "var(--bg3)", borderRadius: 2, overflow: "hidden" }}>
                <div style={{ width: `${pct}%`, height: "100%", background: color, borderRadius: 2, transition: "width .4s" }} />
              </div>
              <span style={{ fontSize: 11, fontFamily: "'DM Mono', monospace", color: "var(--text2)", minWidth: 28, textAlign: "right" }}>
                {have}/{target}
              </span>
            </div>
          );
        })}
      </Card>
    </div>
  );
}

            {isMe && <span style={{ fontSize: 9, background: "rgba(62,207,142,.2)", color: "var(--accent)", padding: "1px 5px", borderRadius: 4, marginLeft: 5, fontWeight: 700 }}>YOU</span>}

          <span style={{ fontSize: 11, color: "var(--text2)", marginLeft: "auto", flexShrink: 0 }}>{record}</span>

      <Card>
        <CardTitle>Total Roster Value Rankings</CardTitle>
        {tvSorted.map(({ r, tv }, i) => (
          <RankRow key={r.roster_id}
            rank={i + 1} name={ownerName(r)}
            isMe={r.roster_id === myRosterId}
            record={`${r.settings?.wins || 0}–${r.settings?.losses || 0}`}
            value={tv} maxVal={maxTV}
          />
        ))}
      </Card>
    </>
  );
}

function AllRosters() {
  const { rosters, players, fcMap, myRosterId, ownerName, getRosterPlayers, fcLoaded, playersLoaded } = useData();
  const [openId, setOpenId] = useState(null);
  const navigate = useNavigate();

  const gradeOf = (avg) => {
    if (avg > 8000) return { g: "A+", bg: "rgba(167,139,250,.15)", color: "#a78bfa" };
    if (avg > 6000) return { g: "A",  bg: "rgba(79,142,247,.15)",  color: "#4f8ef7" };
    if (avg > 3500) return { g: "B",  bg: "rgba(62,207,142,.15)",  color: "#3ecf8e" };
    if (avg > 1500) return { g: "C",  bg: "rgba(246,166,35,.15)",  color: "#f6a623" };
    return { g: "D", bg: "rgba(242,92,84,.15)", color: "#f25c54" };
  };

  const sorted = useMemo(() => [...rosters].sort((a, b) => (b.settings?.wins || 0) - (a.settings?.wins || 0)), [rosters]);

  return (
    <>
      {sorted.map(r => {
        const pl = getRosterPlayers(r);
        const tv = pl.reduce((s, p) => s + (fcMap[p.player_id]?.value || 0), 0);
        const grade = gradeOf(pl.length ? tv / pl.length : 0);
        const isOpen = openId === r.roster_id;
        const sortedPl = [...pl].sort((a, b) => (fcMap[b.player_id]?.value || 0) - (fcMap[a.player_id]?.value || 0));
        return (
          <Card key={r.roster_id} style={{ padding: "10px 12px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}
              onClick={() => setOpenId(isOpen ? null : r.roster_id)}>
              <span style={{ flex: 1, fontWeight: 600, fontSize: 13, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                {ownerName(r)}
                {r.roster_id === myRosterId && <span style={{ fontSize: 9, background: "rgba(62,207,142,.2)", color: "var(--accent)", padding: "1px 5px", borderRadius: 4, marginLeft: 5, fontWeight: 700 }}>YOU</span>}
              </span>
              <span style={{ fontSize: 12, color: "var(--text2)" }}>{r.settings?.wins || 0}–{r.settings?.losses || 0}</span>
              {tv > 0 && <span style={{ fontSize: 11, color: "var(--text3)", fontFamily: "'DM Mono', monospace" }}>{tv.toLocaleString()}</span>}
              <span style={{ fontSize: 11, fontWeight: 600, padding: "2px 6px", borderRadius: 4, background: grade.bg, color: grade.color, fontFamily: "'DM Mono', monospace" }}>{grade.g}</span>
              <span style={{ color: "var(--text3)", fontSize: 12 }}>{isOpen ? "▲" : "▼"}</span>
            </div>
            {isOpen && (
              <div style={{ marginTop: 9, paddingTop: 9, borderTop: "1px solid var(--border)" }}>
                {sortedPl.map(p => (
                  <PlayerRow key={p.player_id} player={p} fcMap={fcMap} showVal showRank compact
                    onClick={() => navigate(`/search/${p.player_id}`)} />
                ))}
              </div>
            )}
          </Card>
        );
      })}
    </>
  );
}

function TradeHistory() {
  const { transactions, players, users, rosters, txnLoaded, ownerName } = useData();
  const trades = useMemo(() => transactions.filter(t => t.type === "trade"), [transactions]);
  const rosterById = (id) => rosters.find(r => r.roster_id === parseInt(id));
  const playerName = pid => players[pid]?.full_name || pid;
  const fcMap = useData().fcMap;

  if (!txnLoaded) return (
    <div style={{ display: "flex", alignItems: "center", gap: 8, color: "var(--text3)", fontSize: 13, padding: "1rem 0" }}>
      <Spinner size={16} /> Loading trade history…
    </div>
  );
  if (!trades.length) return <Empty>No trades found</Empty>;

  return (
    <>
      {trades.slice(0, 40).map(t => {
        const date = t.status_updated ? new Date(t.status_updated).toLocaleDateString("en-US", { month: "short", day: "numeric" }) : "";
        const sides = {};
        (t.roster_ids || []).forEach(rid => { sides[rid] = { adds: [], picks: [] }; });
        if (t.adds) Object.entries(t.adds).forEach(([pid, rid]) => { if (sides[rid]) sides[rid].adds.push(pid); });
        (t.draft_picks || []).forEach(pk => { if (sides[pk.owner_id]) sides[pk.owner_id].picks.push(`${pk.season} R${pk.round}`); });
        return (
          <div key={t.transaction_id || t.status_updated} style={{ background: "var(--bg3)", borderRadius: 10, padding: 12, marginBottom: 8, border: "1px solid var(--border)" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
              <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 6px", borderRadius: 4, background: "rgba(79,142,247,.15)", color: "var(--accent-blue)", textTransform: "uppercase" }}>Trade</span>
              <span style={{ fontSize: 11, color: "var(--text2)" }}>Wk {t.leg || "?"}</span>
              <span style={{ fontSize: 11, color: "var(--text3)", marginLeft: "auto" }}>{date}</span>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              {(t.roster_ids || []).slice(0, 2).map(rid => {
                const side = sides[rid] || { adds: [], picks: [] };
                return (
                  <div key={rid}>
                    <div style={{ fontSize: 10, fontWeight: 600, color: "var(--text3)", marginBottom: 5, textTransform: "uppercase", letterSpacing: "0.05em" }}>
                      {ownerName(rosterById(rid))} gets
                    </div>
                    {side.adds.map(pid => (
                      <div key={pid} style={{ display: "flex", alignItems: "center", gap: 5, padding: "3px 0" }}>
                        <PosBadge pos={players[pid]?.position || ""} size={9} style={{ padding: "1px 4px", minWidth: 22 }} />
                        <span style={{ fontSize: 12, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{playerName(pid)}</span>
                        {fcMap[pid] && <span style={{ fontSize: 10, color: "var(--text3)", fontFamily: "'DM Mono', monospace" }}>{(fcMap[pid].value || 0).toLocaleString()}</span>}
                      </div>
                    ))}
                    {side.picks.map(pk => (
                      <div key={pk} style={{ padding: "3px 0" }}>
                        <span style={{ fontSize: 10, fontWeight: 600, padding: "2px 6px", borderRadius: 4, background: "rgba(167,139,250,.12)", color: "var(--purple)", fontFamily: "'DM Mono', monospace" }}>{pk}</span>
                      </div>
                    ))}
                    {!side.adds.length && !side.picks.length && <span style={{ fontSize: 11, color: "var(--text3)" }}>—</span>}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </>
  );
}

// ── SUGGESTIONS ───────────────────────────────────────────────────────────────
function TradeSuggestions() {
  const { rosters, players, fcMap, histStats, users, myRosterId, getRosterPlayers, getMyRoster, ownerName, fcLoaded, playersLoaded } = useData();
  const [openId, setOpenId] = useState(null);

  const myRoster = getMyRoster();
  const myPlayers = useMemo(() => getRosterPlayers(myRoster), [myRoster, getRosterPlayers]);

  const suggestions = useMemo(() => {
    if (!fcLoaded || !playersLoaded || !myPlayers.length) return [];
    return generateTradeSuggestions(myRoster, myPlayers, rosters, players, fcMap, histStats, users);
  }, [fcLoaded, playersLoaded, myPlayers, rosters, players, fcMap, histStats, users]);

  if (!fcLoaded || !playersLoaded) return (
    <div style={{ display: "flex", alignItems: "center", gap: 8, color: "var(--text3)", fontSize: 13, padding: "1rem 0" }}>
      <Spinner size={16} /> {!fcLoaded ? "Loading values…" : "Loading players…"}
    </div>
  );

  return (
    <>
      <p style={{ fontSize: 12, color: "var(--text2)", marginBottom: 12 }}>
        Ranked by mutual positional fit, mode compatibility, and projection delta.
      </p>
      {!suggestions.length && <Empty>No trade suggestions found</Empty>}
      {suggestions.map(s => {
        const isOpen = openId === s.id;

              <div style={{ flex: 1 }}>

                <div style={{ fontSize: 11, color: "var(--text3)", marginTop: 1 }}>
                  <span style={{ color: s.theirMode === "Rebuilding" ? "var(--amber)" : s.theirMode === "Win Now" ? "var(--purple)" : "var(--accent-blue)", fontWeight: 600 }}>
                    {s.theirMode.toUpperCase()}
                  </span>
                  {" · "}FIT {s.fitScore}
                </div>
              </div>
              <button
                onClick={() => setOpenId(isOpen ? null : s.id)}
                style={{
                  padding: "6px 14px", borderRadius: 20, border: "none",
                  background: "var(--accent)", color: "#0d0f12",

                      <span style={{ flex: 1, fontSize: 12, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.full_name || p.player_id}</span>
                      <span style={{ fontSize: 11, color: "var(--text3)", fontFamily: "'DM Mono', monospace" }}>{(p.value || 0).toLocaleString()}</span>

// ── BUILDER ───────────────────────────────────────────────────────────────────
function TradeBuilder() {
  const { rosters, players, fcMap, myRosterId, getRosterPlayers, getMyRoster, ownerName, histStats } = useData();
  const [targetId, setTargetId]  = useState("");
  const [sendPids, setSendPids]  = useState([]);
  const [recvPids, setRecvPids]  = useState([]);
  const [qA, setQA] = useState("");
  const [qB, setQB] = useState("");

  const myRoster = getMyRoster();
  const myPl = useMemo(() => getRosterPlayers(myRoster), [myRoster, getRosterPlayers]);
  const theirRoster = rosters.find(r => r.roster_id === parseInt(targetId));
  const theirPl = useMemo(() => theirRoster ? getRosterPlayers(theirRoster) : [], [theirRoster, getRosterPlayers]);

  const toggle = (side, pid) => {
    if (side === "A") setSendPids(p => p.includes(pid) ? p.filter(x => x !== pid) : [...p, pid]);
    else setRecvPids(p => p.includes(pid) ? p.filter(x => x !== pid) : [...p, pid]);
  };

  const vA = sendPids.reduce((s, pid) => s + (fcMap[pid]?.value || 0), 0);
  const vB = recvPids.reduce((s, pid) => s + (fcMap[pid]?.value || 0), 0);
  const diff = vA - vB;

  const getLatestPts = (pid) => {
    const h = histStats[pid];
    if (!h) return null;
    const seasons = Object.keys(h).sort((a, b) => b - a);
    for (const s of seasons) { const v = calcPPR(h[s]); if (v > 0) return { pts: v, season: s }; }
    return null;
  };

  const filt = (pl, q) => q ? pl.filter(p => (p.full_name || "").toLowerCase().includes(q.toLowerCase())) : pl;

  const copyPrompt = () => {
    const fmt = (pids) => pids.map(pid => {
      const fc = fcMap[pid]; const lp = getLatestPts(pid);
      return `${players[pid]?.full_name || pid} (FC:${fc?.value || 0}, #${fc?.rank || "?"}, ${lp?.season || "pts"}:${lp ? lp.pts.toFixed(0) : "—"})`;
    }).join(", ");
    const txt = `Dynasty trade (12-team SF PPR):\nI SEND [FC: ${vA.toLocaleString()}]: ${fmt(sendPids) || "nothing"}\nI RECEIVE [FC: ${vB.toLocaleString()}]: ${fmt(recvPids) || "nothing"}\nWho wins short vs long term? Should I do it, pass, or counter?`;
    if (navigator.clipboard) navigator.clipboard.writeText(txt).then(() => alert("Copied! Paste into Claude.ai"));
    else prompt("Copy:", txt);
  };

  return (
    <>
      <div style={{ marginBottom: 12 }}>
        <label style={{ fontSize: 10, color: "var(--text3)", display: "block", marginBottom: 5, textTransform: "uppercase", letterSpacing: "0.06em" }}>Trading With</label>
        <select value={targetId} onChange={e => { setTargetId(e.target.value); setRecvPids([]); }} className="team-select" style={{ maxWidth: "none", width: "100%" }}>
          <option value="">Select a team…</option>
          {rosters.filter(r => r.roster_id !== myRosterId).map(r => (
            <option key={r.roster_id} value={r.roster_id}>{ownerName(r)}</option>
          ))}
        </select>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
        {[["You Send", myPl, sendPids, "A", qA, setQA], ["You Receive", theirPl, recvPids, "B", qB, setQB]].map(([title, pl, sel, side, q, setQ]) => (
          <div key={side} style={{ background: "var(--bg3)", border: "1px solid var(--border)", borderRadius: 14, padding: 10 }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: "var(--text3)", textTransform: "uppercase", letterSpacing: "0.07em", marginBottom: 8 }}>{title}</div>
            <input className="inp" style={{ fontSize: 12, padding: "6px 9px", marginBottom: 8 }} placeholder="Search…" value={q} onChange={e => setQ(e.target.value)} />
            <div style={{ maxHeight: 200, overflowY: "auto" }}>
              {side === "B" && !targetId ? (
                <p style={{ fontSize: 11, color: "var(--text3)" }}>Select a team above</p>
              ) : filt(pl, q).map(p => (
                <label key={p.player_id} style={{ display: "flex", alignItems: "center", gap: 6, padding: "5px 0", borderBottom: "1px solid var(--border)", cursor: "pointer" }}>
                  <input type="checkbox" checked={sel.includes(p.player_id)} onChange={() => toggle(side, p.player_id)}
                    style={{ accentColor: "var(--accent)", width: 14, height: 14, flexShrink: 0 }} />
                  <PosBadge pos={p.position || ""} size={9} style={{ padding: "1px 4px", minWidth: 22 }} />
                  <span style={{ flex: 1, fontSize: 11, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.full_name || p.player_id}</span>
                  {fcMap[p.player_id] && <span style={{ fontSize: 10, color: "var(--text3)", fontFamily: "'DM Mono', monospace" }}>{(fcMap[p.player_id].value || 0).toLocaleString()}</span>}
                </label>
              ))}
            </div>
            <div style={{ marginTop: 6, paddingTop: 6, borderTop: "1px solid var(--border)", fontSize: 11, fontWeight: 600, fontFamily: "'DM Mono', monospace", color: "var(--text2)" }}>
              Total: {(side === "A" ? vA : vB).toLocaleString()}
            </div>
          </div>
        ))}
      </div>

      {(sendPids.length || recvPids.length) ? (
        <div style={{ background: "var(--bg3)", border: "1px solid var(--border)", borderRadius: 14, padding: 14, textAlign: "center" }}>
          <div style={{ fontSize: 10, color: "var(--text3)", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 5 }}>Trade Verdict · FantasyCalc SF</div>
          <div style={{ fontSize: 17, fontWeight: 600, marginBottom: 4, color: diff > 500 ? "#3ecf8e" : diff < -500 ? "#f25c54" : "#f6a623" }}>
            {diff > 500 ? "You win this trade ✓" : diff < -500 ? "You give up value ✗" : "Roughly even ≈"}
          </div>
          {Math.abs(diff) > 0 && (
            <div style={{ fontSize: 12, color: "var(--text2)", fontFamily: "'DM Mono', monospace", marginBottom: 12 }}>
              Δ {Math.abs(diff).toLocaleString()} {diff > 0 ? "in your favor" : "against you"}
            </div>
          )}
          {/* Breakdown */}
          <div style={{ textAlign: "left", marginBottom: 12 }}>
            {[["You send", sendPids], ["You receive", recvPids]].map(([label, pids]) => (
              <div key={label} style={{ marginBottom: 8 }}>
                <div style={{ fontSize: 10, fontWeight: 600, color: "var(--text3)", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 4 }}>{label}</div>
                {pids.map(pid => {
                  const p = players[pid] || {}; const fc = fcMap[pid]; const lp = getLatestPts(pid);
                  return (
                    <div key={pid} style={{ display: "flex", alignItems: "center", gap: 6, padding: "4px 0", borderBottom: "1px solid var(--border)" }}>
                      <PosBadge pos={p.position || ""} size={9} style={{ padding: "1px 4px", minWidth: 22 }} />
                      <span style={{ flex: 1, fontSize: 12, fontWeight: 500 }}>{p.full_name || pid}</span>
                      {lp && <span style={{ fontSize: 10, color: "var(--text2)", fontFamily: "'DM Mono', monospace" }}>{lp.season}: {lp.pts.toFixed(0)}</span>}
                      {fc && <span style={{ fontSize: 10, color: "var(--text3)", fontFamily: "'DM Mono', monospace" }}>#{fc.rank}</span>}
                      <ValBadge val={fc?.value} />
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
          <button onClick={copyPrompt} style={{ padding: "8px 16px", borderRadius: 8, border: "none", background: "var(--accent-blue)", color: "#fff", fontFamily: "inherit", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
            Copy analysis prompt
          </button>
        </div>
      ) : (
        <Empty>Select players on both sides to compare</Empty>
      )}
    </>
  );
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
function PlayerSearch() {
  const { players, fcMap, histStats } = useData();
  const [q, setQ]   = useState("");
  const [pos, setPos] = useState("ALL");
  const navigate = useNavigate();

  const getLatestPts = (pid) => {
    const h = histStats[pid];
    if (!h) return null;
    const seasons = Object.keys(h).sort((a, b) => b - a);
    for (const s of seasons) { const v = calcPPR(h[s]); if (v > 0) return v; }
    return null;
  };

  const results = useMemo(() => {
    if (q.length < 2) return [];
    return Object.entries(players).filter(([pid, p]) => {
      if (!p.full_name) return false;
      const mp = pos === "ALL" || (p.position || "").toUpperCase() === pos;
      return mp && p.full_name.toLowerCase().includes(q.toLowerCase());
    }).slice(0, 30);
  }, [players, q, pos]);

  return (
    <div className="fade-in">
      <input
        className="inp"
        placeholder="Search any NFL player…"
        value={q}
        onChange={e => setQ(e.target.value)}
        style={{ marginBottom: 10 }}
        autoFocus
      />
      <FilterPills
        options={["ALL", "QB", "RB", "WR", "TE"]}
        value={pos}
        onChange={setPos}
      />
      {!Object.keys(players).length && (
        <div style={{ display: "flex", alignItems: "center", gap: 8, color: "var(--text3)", fontSize: 13, padding: "1rem 0" }}>
          <Spinner size={16} /> Loading player database…
        </div>
      )}
      {results.map(([pid, p]) => {
        const fc = fcMap[pid];
        const pts = getLatestPts(pid);
        return (
          <div key={pid} onClick={() => navigate(`/search/${pid}`)}
            style={{ background: "var(--bg2)", border: "1px solid var(--border)", borderRadius: 14, padding: "10px 13px", marginBottom: 7, cursor: "pointer", transition: "border-color .15s" }}
            onMouseEnter={e => e.currentTarget.style.borderColor = "var(--border2)"}
            onMouseLeave={e => e.currentTarget.style.borderColor = "var(--border)"}
          >
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <PosBadge pos={p.position || ""} style={{ minWidth: 28 }} />
              <span style={{ flex: 1, fontWeight: 500, fontSize: 13, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.full_name}</span>
              <span style={{ fontSize: 11, color: "var(--text2)" }}>{p.team || "FA"}</span>
              {pts && <span style={{ fontSize: 11, color: "#2dd4bf", fontFamily: "'DM Mono', monospace" }}>{pts.toFixed(0)}</span>}
              {fc && <ValBadge val={fc.value} />}
            </div>
          </div>
        );
      })}
      {q.length >= 2 && !results.length && <Empty>No players found for "{q}"</Empty>}
      {q.length < 2 && Object.keys(players).length > 0 && <Empty>Type a player name to search</Empty>}
    </div>
  );
}

// ── PLAYER DETAIL ─────────────────────────────────────────────────────────────
function PlayerDetail({ pid }) {
  const { players, fcMap, histStats, rosters, ownerName, newsCache, fetchNews, fcLoaded } = useData();
  const navigate = useNavigate();
  const p = players[pid] || {};
  const fc = fcMap[pid];
  const age = p.age || (p.birth_date ? Math.floor((Date.now() - new Date(p.birth_date)) / 31557600000) : null);
  const ownerRoster = rosters.find(r => (r.players || []).includes(pid));
  const news = newsCache[pid];
  const scout = useMemo(() => fcLoaded ? buildScoutReport(pid, players, fcMap, histStats) : null, [pid, players, fcMap, histStats, fcLoaded]);
  const careerH = histStats[pid] || {};
  const sortedSeasons = Object.keys(careerH).sort((a, b) => b - a);
  const pos = (p.position || "").toUpperCase();

  useEffect(() => {
    if (news === undefined) fetchNews(pid);
  }, [pid, news]);

  // Career stats row
  const buildStatStr = (s) => {
    if (!s) return "";
    if (pos === "QB") {
      const pyds = parseInt(s.pass_yd || 0), ptds = parseInt(s.pass_td || 0), ints = parseInt(s.pass_int || 0), ryds = parseInt(s.rush_yd || 0);
      return pyds > 0 ? `${pyds.toLocaleString()} Yds · ${ptds} TD · ${ints} INT${ryds > 0 ? ` · ${ryds} Rush` : ""}` : "";
    } else if (pos === "RB") {
      const ryds = parseInt(s.rush_yd || 0), rtds = parseInt(s.rush_td || 0), rec = parseInt(s.rec || 0), recyds = parseInt(s.rec_yd || 0);
      return (ryds > 0 || rec > 0) ? `${ryds} Rush · ${rtds} TD · ${rec} Rec · ${recyds} Rec Yd` : "";
    } else {
      const rec = parseInt(s.rec || 0), recyds = parseInt(s.rec_yd || 0), tds = parseInt(s.rec_td || 0), tgts = parseInt(s.tgt || 0);
      return rec > 0 ? `${tgts > 0 ? tgts + " Tgt · " : ""}${rec} Rec · ${recyds} Yd · ${tds} TD` : "";
    }
  };

  const mostRecentSeason = sortedSeasons[0];
  const mostRecentPts = mostRecentSeason ? calcPPR(careerH[mostRecentSeason]) : null;
  const prevSeason = sortedSeasons[1];
  const prevPts = prevSeason ? calcPPR(careerH[prevSeason]) : null;

  return (
    <div className="fade-in">
      <button onClick={() => navigate(-1)} style={{
        display: "flex", alignItems: "center", gap: 6, padding: "6px 10px",
        borderRadius: 8, border: "1px solid var(--border)", background: "var(--bg3)",
        color: "var(--text2)", fontFamily: "inherit", fontSize: 12, cursor: "pointer", marginBottom: 12,
      }}>← Back</button>

      {/* Player header card */}
      <Card>
        <div style={{ marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
            <PosBadge pos={p.position || ""} style={{ fontSize: 12, padding: "3px 7px" }} />
            <h2 style={{ fontSize: 19, fontWeight: 600, letterSpacing: "-0.02em" }}>{p.full_name || pid}</h2>
          </div>
          <div style={{ fontSize: 12, color: "var(--text2)" }}>
            {p.team || "FA"} · Age {age || "?"} · {p.years_exp != null ? `${p.years_exp}yr exp` : "Rookie"}
          </div>
          {ownerRoster
            ? <div style={{ fontSize: 11, color: "var(--text3)", marginTop: 3 }}>Owned by {ownerName(ownerRoster)}</div>
            : <div style={{ fontSize: 11, color: "var(--accent)", marginTop: 3 }}>✓ Free agent</div>}
        </div>

        {/* Value metrics */}
        <div className="grid2" style={{ marginBottom: sortedSeasons.length ? 14 : 0 }}>
          {fc ? <>
            <div style={{ background: "var(--bg3)", borderRadius: 10, padding: "10px 12px" }}>
              <div style={{ fontSize: 10, color: "var(--text3)", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 2 }}>FC Value (SF)</div>
              <div style={{ fontSize: 20, fontWeight: 600, letterSpacing: "-0.02em" }}>{fc.value.toLocaleString()}</div>
            </div>
            <div style={{ background: "var(--bg3)", borderRadius: 10, padding: "10px 12px" }}>
              <div style={{ fontSize: 10, color: "var(--text3)", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 2 }}>Overall Rank</div>
              <div style={{ fontSize: 20, fontWeight: 600, letterSpacing: "-0.02em" }}>#{fc.rank}</div>
              <div style={{ fontSize: 11, color: "var(--text2)", marginTop: 1, display: "flex", alignItems: "center", gap: 5 }}>
                Pos: #{fc.posRank} <TrendBadge trend={fc.trend30} />
              </div>
            </div>
          </> : <div style={{ gridColumn: "span 2", background: "var(--bg3)", borderRadius: 10, padding: "10px 12px" }}>
            <div style={{ fontSize: 13, color: "var(--text3)" }}>{fcLoaded ? "Not ranked" : "Loading values…"}</div>
          </div>}
          {mostRecentPts > 0 && (
            <div style={{ background: "var(--bg3)", borderRadius: 10, padding: "10px 12px" }}>
              <div style={{ fontSize: 10, color: "var(--text3)", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 2 }}>{mostRecentSeason} Pts</div>
              <div style={{ fontSize: 20, fontWeight: 600, letterSpacing: "-0.02em", color: "#3ecf8e" }}>{mostRecentPts.toFixed(0)}</div>
            </div>
          )}
          {prevPts > 0 && (
            <div style={{ background: "var(--bg3)", borderRadius: 10, padding: "10px 12px" }}>
              <div style={{ fontSize: 10, color: "var(--text3)", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 2 }}>{prevSeason} Pts</div>
              <div style={{ fontSize: 18, fontWeight: 600, letterSpacing: "-0.02em" }}>{prevPts.toFixed(0)}</div>
            </div>
          )}
          {p.height && (
            <div style={{ background: "var(--bg3)", borderRadius: 10, padding: "10px 12px" }}>
              <div style={{ fontSize: 10, color: "var(--text3)", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 2 }}>Height</div>
              <div style={{ fontSize: 18, fontWeight: 600 }}>{Math.floor(p.height / 12)}'{p.height % 12}"</div>
            </div>
          )}
          {p.weight && (
            <div style={{ background: "var(--bg3)", borderRadius: 10, padding: "10px 12px" }}>
              <div style={{ fontSize: 10, color: "var(--text3)", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 2 }}>Weight</div>
              <div style={{ fontSize: 18, fontWeight: 600 }}>{p.weight} lb</div>
            </div>
          )}
        </div>

        {/* Career stats table */}
        {sortedSeasons.length > 0 && (
          <>
            <div style={{ fontSize: 11, fontWeight: 700, color: "var(--text3)", textTransform: "uppercase", letterSpacing: "0.07em", marginBottom: 8 }}>
              Career Stats (PPR)
            </div>
            {sortedSeasons.map(yr => {
              const s = careerH[yr];
              const fpts = calcPPR(s);
              const gp = parseInt(s.gp || s.games_played || 0);
              const statStr = buildStatStr(s);
              const fptsColor = fpts > 300 ? "#3ecf8e" : fpts > 200 ? "#2dd4bf" : fpts > 100 ? "var(--text)" : "var(--text3)";
              return (
                <div key={yr} style={{ display: "flex", alignItems: "center", padding: "7px 0", borderBottom: "1px solid var(--border)" }}>
                  <span style={{ fontSize: 13, fontWeight: 600, minWidth: 44, color: "var(--text2)" }}>{yr}</span>
                  <span style={{ fontSize: 11, color: "var(--text3)", minWidth: 30 }}>{gp > 0 ? `${gp}gm` : ""}</span>
                  <span style={{ flex: 1, fontSize: 11, color: "var(--text3)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{statStr}</span>
                  <span style={{ fontSize: 14, fontWeight: 600, fontFamily: "'DM Mono', monospace", color: fptsColor, minWidth: 52, textAlign: "right" }}>
                    {fpts > 0 ? `${fpts.toFixed(1)} pts` : ""}
                  </span>
                </div>
              );
            })}
          </>
        )}
      </Card>

      {/* Scouting report */}
      <Card>
        <CardTitle>Dynasty Scouting Report</CardTitle>
        {scout ? (
          <>
            <span style={{
              display: "inline-block", fontSize: 12, fontWeight: 700,
              padding: "4px 12px", borderRadius: 20, marginBottom: 10,
              background: scout.verdictColor + "22", color: scout.verdictColor,
            }}>{scout.verdict}</span>
            {[["Production & Value", "var(--accent-blue)", scout.s1], ["Age Curve", "var(--amber)", scout.s2], ["Dynasty Verdict", "var(--accent)", scout.s3]].map(([title, color, text]) => (
              <div key={title} style={{ marginBottom: 10 }}>
                <div style={{ fontSize: 10, fontWeight: 700, color, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 4 }}>{title}</div>
                <div style={{ fontSize: 13, color: "var(--text2)", lineHeight: 1.65 }}>{text}</div>
              </div>
            ))}
          </>
        ) : (
          <div style={{ display: "flex", alignItems: "center", gap: 8, color: "var(--text3)", fontSize: 12 }}>
            <Spinner size={16} /> {fcLoaded ? "Analyzing…" : "Loading values…"}
          </div>
        )}
      </Card>

      {/* ESPN news */}
      <Card>
        <CardTitle>Latest News · ESPN</CardTitle>
        {news === undefined || news === null ? (
          <div style={{ display: "flex", alignItems: "center", gap: 8, color: "var(--text3)", fontSize: 12, padding: "4px 0" }}>
            <Spinner size={16} /> Loading news…
          </div>
        ) : news.length ? news.map((a, i) => (
          <div key={i} style={{ padding: "9px 0", borderBottom: i < news.length - 1 ? "1px solid var(--border)" : "none" }}>
            <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 3, lineHeight: 1.4 }}>{a.headline}</div>
            {a.desc && <div style={{ fontSize: 12, color: "var(--text2)", marginTop: 3, lineHeight: 1.5 }}>{a.desc.slice(0, 160)}{a.desc.length > 160 ? "…" : ""}</div>}
            <div style={{ fontSize: 11, color: "var(--text3)", marginTop: 3 }}>{a.date}</div>
          </div>
        )) : (
          <div style={{ fontSize: 12, color: "var(--text3)", padding: "4px 0" }}>No recent ESPN news found</div>
        )}
      </Card>
    </div>
  );
}


// ═══════════ App ═══════════
const NAV = [
  { path: "/",       label: "Home",   icon: HomeIcon },
  { path: "/roster", label: "Roster", icon: RosterIcon },
  { path: "/league", label: "League", icon: LeagueIcon },
  { path: "/trade",  label: "Trade",  icon: TradeIcon },
  { path: "/search", label: "Search", icon: SearchIcon },
];

function AppShell() {
  const { league, rosters, users, myRosterId, setMyRosterId, ownerName, leagueError } = useData();
  const location = useLocation();
  const navigate = useNavigate();

  const currentPage = NAV.find(n => n.path !== "/" ? location.pathname.startsWith(n.path) : location.pathname === "/");
  const myRoster = rosters.find(r => r.roster_id === myRosterId) || rosters[0];
  const teamName = myRoster ? ownerName(myRoster) : "Dynasty HQ";

  // Page titles
  const pageTitles = {
    "/": [league?.name || "Dynasty HQ", "12-team · Superflex · PPR"],
    "/roster": [teamName, `${(myRoster?.players || []).length} players`],
    "/league": ["League", "Power rankings & rosters"],
    "/trade": ["Trade", "Suggestions & builder"],
    "/search": ["Search", "Players & scouting"],
  };
  const activeBase = currentPage?.path || "/";
  const [title, subtitle] = pageTitles[activeBase] || pageTitles["/"];

  return (
    <div className="app-shell">
      {/* Top bar */}
      <div className="topbar">
        {/* Avatar */}
        <div style={{
          width: 36, height: 36, borderRadius: 8,
          background: "var(--accent)", color: "#0d0f12",
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 16, fontWeight: 700, flexShrink: 0,
        }}>
          {(teamName || "D").charAt(0).toUpperCase()}
        </div>
        <div className="topbar-title">
          <h1>{title}</h1>
          {subtitle && <p>{subtitle}</p>}
        </div>
        {/* Team selector */}
        <select
          className="team-select"
          value={myRosterId || ""}
          onChange={e => setMyRosterId(parseInt(e.target.value))}
        >
          {rosters.map(r => (
            <option key={r.roster_id} value={r.roster_id}>{ownerName(r)}</option>
          ))}
        </select>
      </div>

      {/* Error banner */}
      {leagueError && (
        <div style={{ background: "rgba(242,92,84,.15)", borderBottom: "1px solid rgba(242,92,84,.3)", padding: "8px 14px", fontSize: 12, color: "#f25c54", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span>⚠ Could not load league: {leagueError}</span>
          <button onClick={() => window.location.reload()} style={{ background: "none", border: "none", color: "#f25c54", cursor: "pointer", fontSize: 12, textDecoration: "underline" }}>Retry</button>
        </div>
      )}

      {/* Main content */}
      <div className="main-scroll">
        <Routes>
          <Route path="/"              element={<Home />} />
          <Route path="/roster"        element={<Roster />} />
          <Route path="/league"        element={<League />} />
          <Route path="/trade"         element={<Trade />} />
          <Route path="/search"        element={<Search />} />
          <Route path="/search/:pid"   element={<Search />} />
          <Route path="*"              element={<Navigate to="/" replace />} />
        </Routes>
      </div>

      {/* Bottom nav */}
      <nav className="bottomnav">
        {NAV.map(({ path, label, icon: Icon }) => {
          const active = path === "/" ? location.pathname === "/" : location.pathname.startsWith(path);
          return (
            <button key={path} className={`nav-btn${active ? " active" : ""}`} onClick={() => navigate(path)}>
              <Icon />
              {label}
            </button>
          );
        })}
      </nav>
    </div>
  );
}

function App() {
  return (
    <HashRouter>
      <DataProvider>
        <AppShell />
      </DataProvider>
    </HashRouter>
  );
}

// ── SVG Icons ─────────────────────────────────────────────────────────────────
function HomeIcon() {
  return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.75}>
    <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
    <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
  </svg>;
}
function RosterIcon() {
  return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.75}>
    <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
  </svg>;
}
function LeagueIcon() {
  return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.75}>
    <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
  </svg>;
}
function TradeIcon() {
  return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.75}>
    <path d="M7 16V4m0 0L3 8m4-4l4 4"/><path d="M17 8v12m0 0l4-4m-4 4l-4-4"/>
  </svg>;
}
function SearchIcon() {
  return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.75}>
    <circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/>
  </svg>;
}


// Mount
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(React.StrictMode, null, React.createElement(App)));
</script>
</body>
</html>
